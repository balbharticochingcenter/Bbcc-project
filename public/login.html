<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Coaching App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #ffd700; }
        body { background: #f1f5f9; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Header Same as Index */
        .vip-nav { background: var(--primary); padding: 10px 5%; display: flex; align-items: center; justify-content: space-between; color: white; }
        
        /* Login Container */
        .login-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
            border-top: 5px solid var(--accent);
        }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .btn-login { 
            background: var(--primary); color: white; width: 100%; 
            padding: 12px; border-radius: 10px; font-weight: bold; border: none; transition: 0.3s;
        }
        .btn-login:hover { background: #1e293b; transform: scale(1.02); }

        footer { background: #1a1a1a; color: white; padding: 30px 0; margin-top: auto; }
    </style>
</head>
<body>

    <header class="vip-nav">
        <div class="logo fw-bold" id="db-logo">LOGO</div>
        <div class="text-center">
            <h1 class="fs-5 m-0 text-warning">Admin Portal</h1>
            <small>Secure Access Only</small>
        </div>
        <div class="nav-links d-none d-md-block">
            <a href="/" class="text-white text-decoration-none">Back to Site</a>
        </div>
    </header>

    <section class="login-section">
        <div class="login-card">
            <h3 class="text-center fw-bold mb-4">Login</h3>
            <div id="alert-box"></div> <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Admin ID</label>
                    <input type="text" id="userid" class="form-control" placeholder="Enter ID" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" id="pws" class="form-control" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="btn-login">Login Now</button>
            </form>
        </div>
    </section>

    <footer class="text-center">
        <p class="m-0 small">&copy; 2024 Secure Admin Login | Coaching Center</p>
    </footer>

    <script>
        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alert-box');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userid = document.getElementById('userid').value;
            const password = document.getElementById('pws').value;

            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userid, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Success: Save a token in local storage and redirect
                    localStorage.setItem('isAdmin', 'true');
                    alertBox.innerHTML = `<div class="alert alert-success">Success! Redirecting...</div>`;
                    setTimeout(() => { window.location.href = '/admin-dashboard.html'; }, 1500);
                } else {
                    // Wrong ID/PWS
                    alertBox.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            } catch (err) {
                alertBox.innerHTML = `<div class="alert alert-danger">Server error, try again later.</div>`;
            }
        });

        // Logo text fetch (Index jaisa hi)
        fetch('/api/config').then(res => res.json()).then(data => {
            document.getElementById('db-logo').innerText = data.logoText;
        });
    </script>
</body>
</html>
