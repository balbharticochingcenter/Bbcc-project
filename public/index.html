<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBCC - Bal Bharti Coaching Center</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #ffd700; 
            --glass: rgba(255, 255, 255, 0.1); 
        }
        
        body { 
            background: #f1f5f9; 
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .vip-nav {
            background: var(--primary);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header-center { 
            text-align: center; 
            flex-grow: 1; 
        }
        
        .header-center h1 { 
            font-size: 1.4rem; 
            margin: 0; 
            color: var(--accent); 
            letter-spacing: 1px; 
        }
        
        .header-center small { 
            font-size: 0.75rem; 
            opacity: 0.8; 
        }
        
        .nav-links a { 
            color: white; 
            text-decoration: none; 
            margin: 0 10px; 
            font-weight: 500; 
            transition: 0.3s; 
        }
        
        .nav-links a:hover { 
            color: var(--accent); 
        }

        .logo-img {
            max-height: 50px;
            max-width: 150px;
            border-radius: 8px;
        }

        .slider-section { 
            padding: 40px 0; 
            background: #e2e8f0; 
        }
        
        .swiper { 
            width: 300px; 
            height: 300px; 
            padding: 50px; 
        }
        
        @media (min-width: 992px) { 
            .swiper { 
                width: 500px; 
                height: 500px; 
            } 
        }
        
        .swiper-slide {
            background-position: center;
            background-size: cover;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .swiper-slide img { 
            width: 100%; 
            height: 100%; 
            border-radius: 20px; 
            object-fit: cover; 
        }

        .about-card {
            background: white; 
            border-radius: 25px; 
            padding: 40px;
            margin-top: -30px; 
            position: relative; 
            z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mobile-bar {
            display: none; 
            position: fixed; 
            bottom: 0; 
            width: 100%;
            background: white; 
            height: 70px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000; 
            border-radius: 25px 25px 0 0;
            justify-content: space-around; 
            align-items: center;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-bar { display: flex; }
            .header-center h1 { font-size: 1.1rem; }
        }

        .btn-vip { 
            background: var(--accent); 
            color: var(--primary); 
            font-weight: bold; 
            border-radius: 10px; 
            border: none; 
            padding: 8px 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .btn-vip:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .toast-notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent);
        }
        
        .toast-notification.show {
            display: flex;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .back-to-top {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--primary);
            color: var(--accent);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            border: 2px solid var(--accent);
            z-index: 999;
        }
        
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            background: var(--accent);
            color: var(--primary);
            transform: translateY(-5px);
        }

        /* SIMPLE FIX: Make buttons more clickable */
        .btn-vip {
            position: relative;
            z-index: 9999;
            pointer-events: auto !important;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-notification">
        <i class="fas fa-info-circle"></i>
        <span id="toast-message"></span>
    </div>

    <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <header class="vip-nav sticky-top">
        <div class="logo fw-bold fs-4" id="db-logo">
            <i class="fas fa-graduation-cap me-2"></i>LOGO
        </div>
        
        <div class="header-center">
            <h1 id="db-title">Bal Bharti Coaching</h1>
            <small id="db-subtitle">Sub Title Loading...</small>
        </div>

        <div class="nav-links">
            <a href="/"><i class="fas fa-home me-1"></i>Home</a>
            <a href="#about"><i class="fas fa-info-circle me-1"></i>About</a>
            <a href="/contact"><i class="fas fa-envelope me-1"></i>Contact</a>
            
            <!-- ✅ SIMPLEST FIX: Use anchor tags instead of buttons -->
            <a href="login.html" class="btn-vip ms-2" style="text-decoration: none; display: inline-block;">
                <i class="fas fa-sign-in-alt me-1"></i>Login
            </a>
            <a href="register.html" class="btn-vip ms-2" style="background: white; color: var(--primary); text-decoration: none; display: inline-block;">
                <i class="fas fa-user-plus me-1"></i>Register
            </a>
        </div>
    </header>

    <section class="slider-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="db-slides">
                <div class="swiper-slide loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="container" id="about">
        <div class="about-card">
            <h2 class="text-center fw-bold mb-4" style="color: var(--primary);">
                <i class="fas fa-chalkboard-teacher me-2"></i>About Our Coaching
            </h2>
            <div id="db-about" class="text-muted leading-relaxed text-center">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white pt-5 pb-5 mt-5">
        <div class="container text-center">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5 class="text-warning"><i class="fas fa-link me-2"></i>Quick Links</h5>
                    <div class="d-flex flex-column">
                        <a href="/" class="text-white text-decoration-none mb-2"><i class="fas fa-angle-right me-2"></i>Home</a>
                        <a href="#about" class="text-white text-decoration-none mb-2"><i class="fas fa-angle-right me-2"></i>About</a>
                        <a href="#" class="text-white text-decoration-none mb-2"><i class="fas fa-angle-right me-2"></i>Help</a>
                    </div>
                </div>
                
                <div class="col-md-4 mb-4">
                    <h5 class="text-warning"><i class="fas fa-share-alt me-2"></i>Connect With Us</h5>
                    <div id="db-socials" class="fs-2 mt-2"></div>
                </div>
                
                <div class="col-md-4 mb-4">
                    <h5 class="text-warning"><i class="fas fa-clock me-2"></i>Hours</h5>
                    <p class="mb-1">Mon-Fri: 9 AM - 8 PM</p>
                    <p>Sat-Sun: 10 AM - 4 PM</p>
                </div>
            </div>
            <hr>
            <p class="small text-muted">
                <i class="far fa-copyright me-1"></i>2024 Bal Bharti Coaching Center | 
                <i class="fas fa-shield-alt me-1"></i>Built with Security
            </p>
        </div>
    </footer>

    <div class="mobile-bar">
        <a href="/" class="text-center text-dark text-decoration-none">
            <i class="fas fa-home d-block fs-4 text-primary"></i>
            <small>Home</small>
        </a>
        <!-- ✅ Mobile mein bhi anchor tag use kiya -->
        <a href="login.html" class="text-center text-dark text-decoration-none">
            <i class="fas fa-sign-in-alt d-block fs-4 text-primary"></i>
            <small>Login</small>
        </a>
        <a href="register.html" class="text-center text-dark text-decoration-none">
            <i class="fas fa-user-plus d-block fs-4 text-primary"></i>
            <small>Join</small>
        </a>
        <a href="#about" class="text-center text-dark text-decoration-none">
            <i class="fas fa-info-circle d-block fs-4 text-primary"></i>
            <small>About</small>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script>
        // ============================================
        // SHOW TOAST FUNCTION
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.innerText = message;
            
            if (type === 'success') {
                toast.style.borderLeftColor = '#28a745';
            } else if (type === 'error') {
                toast.style.borderLeftColor = '#dc3545';
            } else {
                toast.style.borderLeftColor = '#ffd700';
            }
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // CHECK IF LOGGED IN
        // ============================================
        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            const isAdmin = localStorage.getItem('isAdmin');
            
            if (token && isAdmin === 'true') {
                // Update login link to Dashboard
                const loginLink = document.querySelector('.nav-links a[href="login.html"]');
                if (loginLink) {
                    loginLink.innerHTML = '<i class="fas fa-tachometer-alt me-1"></i>Dashboard';
                    loginLink.href = 'admin-dashboard.html';
                }
                
                // Update mobile login link
                const mobileLoginLink = document.querySelector('.mobile-bar a[href="login.html"]');
                if (mobileLoginLink) {
                    mobileLoginLink.innerHTML = '<i class="fas fa-tachometer-alt d-block fs-4 text-primary"></i><small>Dashboard</small>';
                    mobileLoginLink.href = 'admin-dashboard.html';
                }
            }
        }

        // ============================================
        // BACK TO TOP
        // ============================================
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        // ============================================
        // DISPLAY LOGO
        // ============================================
        function displayLogo(logoData) {
            const logoElement = document.getElementById('db-logo');
            
            if (logoData && logoData.startsWith('data:image')) {
                logoElement.innerHTML = `<img src="${logoData}" alt="Logo" class="logo-img">`;
            } else {
                logoElement.innerHTML = `<i class="fas fa-graduation-cap me-2"></i>${logoData || 'BBCC'}`;
            }
        }

        // ============================================
        // LOAD SITE DATA
        // ============================================
        async function loadSiteData() {
            try {
                const slideWrapper = document.getElementById('db-slides');
                const aboutElement = document.getElementById('db-about');
                
                const res = await fetch('/api/config');
                
                if (!res.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const data = await res.json();

                displayLogo(data.logoText);
                    
                document.getElementById('db-title').innerText = data.title || 'Bal Bharti Coaching';
                document.getElementById('db-subtitle').innerText = data.subTitle || 'Excellence in Education';
                aboutElement.innerHTML = data.aboutText || 'Welcome to Bal Bharti Coaching Center.';

                slideWrapper.innerHTML = '';
                
                if (data.slides && data.slides.length > 0) {
                    data.slides.forEach(imgUrl => {
                        if (imgUrl && imgUrl.trim() !== '') {
                            slideWrapper.innerHTML += `<div class="swiper-slide"><img src="${imgUrl}" alt="Slide" loading="lazy" /></div>`;
                        }
                    });
                } else {
                    slideWrapper.innerHTML = `
                        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=500" alt="Default 1" loading="lazy" /></div>
                        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=500" alt="Default 2" loading="lazy" /></div>
                        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1503676260728-5177806628cb?w=500" alt="Default 3" loading="lazy" /></div>
                    `;
                }

                const socialsHtml = [];
                
                if (data.whatsapp) socialsHtml.push(`<a href="${data.whatsapp}" target="_blank" class="text-white me-3"><i class="fab fa-whatsapp"></i></a>`);
                if (data.insta) socialsHtml.push(`<a href="${data.insta}" target="_blank" class="text-white me-3"><i class="fab fa-instagram"></i></a>`);
                if (data.fb) socialsHtml.push(`<a href="${data.fb}" target="_blank" class="text-white me-3"><i class="fab fa-facebook"></i></a>`);
                
                document.getElementById('db-socials').innerHTML = socialsHtml.length ? socialsHtml.join('') : `
                    <a href="#" class="text-white me-3"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" class="text-white me-3"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="text-white me-3"><i class="fab fa-facebook"></i></a>
                `;

                try {
                    new Swiper(".mySwiper", {
                        effect: "cube",
                        grabCursor: true,
                        cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 },
                        pagination: { el: ".swiper-pagination", clickable: true },
                        autoplay: { delay: 2500, disableOnInteraction: false },
                        loop: true
                    });
                    
                    showToast('Website loaded successfully!', 'success');
                    
                } catch (swiperError) {
                    console.error("Swiper error:", swiperError);
                }

            } catch (err) { 
                console.error("Data fetch error:", err);
                showToast('Failed to load content.', 'error');
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadSiteData();
            checkLoginStatus();
            
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        });
    </script>
</body>
</html>
