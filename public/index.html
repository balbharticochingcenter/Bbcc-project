<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBCC</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --primary: #0f172a; --accent: #ffd700; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #f1f5f9; overflow-x: hidden; }

        /* Header Style */
        .vip-nav {
            background: var(--primary);
            padding: 10px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header-center { text-align: center; flex-grow: 1; }
        .header-center h1 { font-size: 1.4rem; margin: 0; color: var(--accent); letter-spacing: 1px; }
        .header-center small { font-size: 0.75rem; opacity: 0.8; }
        
        .nav-links a { color: white; text-decoration: none; margin: 0 10px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* 3D Slider Container */
        .slider-section { padding: 40px 0; background: #e2e8f0; }
        .swiper { width: 300px; height: 300px; padding: 50px; }
        @media (min-width: 992px) { .swiper { width: 500px; height: 500px; } }
        
        .swiper-slide {
            background-position: center;
            background-size: cover;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .swiper-slide img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; }

        /* About Section */
        .about-card {
            background: white; border-radius: 25px; padding: 40px;
            margin-top: -30px; position: relative; z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        /* Mobile Bottom App Bar */
        .mobile-bar {
            display: none; position: fixed; bottom: 0; width: 100%;
            background: white; height: 70px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000; border-radius: 25px 25px 0 0;
            justify-content: space-around; align-items: center;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-bar { display: flex; }
            .header-center h1 { font-size: 1.1rem; }
        }

        .btn-vip { background: var(--accent); color: var(--primary); font-weight: bold; border-radius: 10px; border: none; padding: 8px 20px; }
    </style>
</head>
<body>

    <header class="vip-nav sticky-top">
        <div class="logo fw-bold fs-4" id="db-logo">LOGO</div>
        
        <div class="header-center">
            <h1 id="db-title">Bal Bharti Coaching</h1>
            <small id="db-subtitle">Sub Title Loading...</small>
        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#about">About</a>
            <a href="/contact">Contact</a>
            <button onclick="location.href='login.html'" class="btn-vip ms-2">Login</button>
<button onclick="location.href='register.html'" class="btn-vip ms-2" style="background: white;">Register</button>
        </div>
    </header>

    <section class="slider-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="db-slides">
                </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <section class="container" id="about">
        <div class="about-card">
            <h2 class="text-center fw-bold mb-4" style="color: var(--primary);">About Our Coaching</h2>
            <p id="db-about" class="text-muted leading-relaxed text-center">
                Loading about information...
            </p>
        </div>
    </section>

    <footer class="bg-dark text-white pt-5 pb-5 mt-5">
        <div class="container text-center">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <h5 class="text-warning">Links</h5>
                    <div class="d-flex flex-column">
                        <a href="#" class="text-white text-decoration-none">Home</a>
                        <a href="#" class="text-white text-decoration-none">About</a>
                        <a href="#" class="text-white text-decoration-none">Help</a>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <h5 class="text-warning">Connect</h5>
                    <div id="db-socials" class="fs-2 mt-2">
                        </div>
                </div>
            </div>
            <hr>
            <p class="small text-muted">&copy; 2024 Coaching Center | Built with Security</p>
        </div>
    </footer>

    <div class="mobile-bar">
        <a href="#" class="text-center text-dark text-decoration-none"><i class="fas fa-home d-block fs-4 text-primary"></i><small>Home</small></a>
        <a href="#" class="text-center text-dark text-decoration-none" onclick="location.href='/login.html'"><i class="fas fa-sign-in-alt d-block fs-4 text-primary"></i><small>Login</small></a>
        <a href="#" class="text-center text-dark text-decoration-none" onclick="location.href='/register.html'"><i class="fas fa-user-plus d-block fs-4 text-primary"></i><small>Join</small></a>
        <a href="#about" class="text-center text-dark text-decoration-none"><i class="fas fa-info-circle d-block fs-4 text-primary"></i><small>About</small></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function loadSiteData() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                // Header & Content
                document.getElementById('db-logo').innerText = data.logoText;
                document.getElementById('db-title').innerText = data.title;
                document.getElementById('db-subtitle').innerText = data.subTitle;
                document.getElementById('db-about').innerText = data.aboutText;

                // 3D Slider Images
                const slideWrapper = document.getElementById('db-slides');
                data.slides.forEach(imgUrl => {
                    slideWrapper.innerHTML += `<div class="swiper-slide"><img src="${imgUrl}" /></div>`;
                });

                // Socials
                document.getElementById('db-socials').innerHTML = `
                    <a href="${data.whatsapp}" class="text-white me-3"><i class="fab fa-whatsapp"></i></a>
                    <a href="${data.insta}" class="text-white me-3"><i class="fab fa-instagram"></i></a>
                    <a href="${data.fb}" class="text-white me-3"><i class="fab fa-facebook"></i></a>
                `;

                // Initialize 3D Cube Effect
                new Swiper(".mySwiper", {
                    effect: "cube",
                    grabCursor: true,
                    cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 },
                    pagination: { el: ".swiper-pagination" },
                    autoplay: { delay: 2500 }
                });

            } catch (err) { console.error("Data fetch error"); }
        }
        loadSiteData();
    </script>
</body>
</html>
