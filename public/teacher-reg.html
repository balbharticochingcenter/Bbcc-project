<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration - BBCC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border: 1px solid #ccc; }
        #video { width: 100%; max-width: 400px; border-radius: 8px; }
        #camera-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div id="form-section" class="card shadow p-4">
        <h2 class="text-primary mb-4">Teacher Registration Form</h2>
        <form id="regForm">
            <div class="row g-3">
                <div class="col-md-4"><label>First Name</label><input type="text" id="fName" class="form-control" required></div>
                <div class="col-md-4"><label>Middle Name</label><input type="text" id="mName" class="form-control"></div>
                <div class="col-md-4"><label>Last Name</label><input type="text" id="lName" class="form-control" required></div>
                
                <div class="col-md-4"><label>Father First Name</label><input type="text" id="ffName" class="form-control" required></div>
                <div class="col-md-4"><label>Father Middle Name</label><input type="text" id="fmName" class="form-control"></div>
                <div class="col-md-4"><label>Father Last Name</label><input type="text" id="flName" class="form-control" required></div>

                <div class="col-md-4"><label>Mobile</label><input type="number" id="mobile" class="form-control" required></div>
                <div class="col-md-4"><label>Alt Mobile</label><input type="number" id="altMobile" class="form-control"></div>
                <div class="col-md-4"><label>Date of Birth</label><input type="date" id="dob" class="form-control" required></div>

                <div class="col-md-6"><label>Aadhar Number (Unique ID)</label><input type="number" id="aadharNum" class="form-control" required></div>
                <div class="col-md-6"><label>Last Qualification</label><input type="text" id="qual" class="form-control" required></div>

                <div class="col-md-6">
                    <label>Teacher Photo</label>
                    <input type="file" id="photoFile" class="form-control img-input" accept="image/*">
                    <button type="button" id="startCameraBtn" class="btn btn-sm btn-secondary mt-2">Live Capture</button>
                    <input type="hidden" id="photoData">
                </div>

                <div class="col-md-6">
                    <label>Aadhar Document</label>
                    <input type="file" id="aadharFile" class="form-control img-input" accept="image/*">
                    <input type="hidden" id="aadharData">
                </div>

                <div class="col-md-6">
                    <label>Qualification Document</label>
                    <input type="file" id="qualFile" class="form-control img-input" accept="image/*">
                    <input type="hidden" id="qualData">
                </div>
            </div>
            <button type="button" id="nextBtn" class="btn btn-primary mt-4 w-100">Next (Preview)</button>
        </form>
    </div>

    <div id="camera-modal" class="hidden bg-white border rounded">
        <h5>Capture Photo</h5>
        <video id="video" autoplay playsinline></video><br>
        <div class="mt-2">
            <button id="captureBtn" class="btn btn-danger">Capture Now</button>
            <button id="closeCameraBtn" class="btn btn-secondary">Cancel</button>
        </div>
    </div>

    <div id="preview-section" class="card shadow p-4 hidden">
        <h2 class="text-success">Review Details</h2>
        <div id="preview-content" class="my-3"></div>
        <div class="d-flex gap-2">
            <button id="editBtn" class="btn btn-warning">Edit</button>
            <button id="finalSubmitBtn" class="btn btn-success">Final Submit</button>
        </div>
    </div>

    <div id="success-section" class="card shadow p-5 text-center hidden">
        <h1 class="text-success">Registration Successful!</h1>
        <div class="alert alert-info mt-3">
            <p><strong>Your ID:</strong> <span id="resID"></span></p>
            <p><strong>Your Password:</strong> <span id="resPWS"></span></p>
        </div>
        <h4 class="text-danger">Please take a SCREENSHOT of this page!</h4>
    </div>
</div>

<script>
    let currentTarget = 'photo';
    let stream = null;

    // --- Utility: Image Compression ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxSize = 600; // Better resolution
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    // --- Event Listeners (Replacing onchange/onclick) ---

    // File inputs change
    document.querySelectorAll('.img-input').forEach(input => {
        input.addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                const compressed = await compressImage(e.target.files[0]);
                document.getElementById(e.target.id.replace('File', 'Data')).value = compressed;
            }
        });
    });

    // Start Camera
    document.getElementById('startCameraBtn').addEventListener('click', async () => {
        currentTarget = 'photo';
        const modal = document.getElementById('camera-modal');
        modal.classList.remove('hidden');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            alert("Camera access denied!");
            modal.classList.add('hidden');
        }
    });

    // Capture Photo
    document.getElementById('captureBtn').addEventListener('click', () => {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        document.getElementById(currentTarget + 'Data').value = canvas.toDataURL('image/jpeg', 0.7);
        stopCamera();
        alert("Photo Captured!");
    });

    // Close Camera
    document.getElementById('closeCameraBtn').addEventListener('click', stopCamera);

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('camera-modal').classList.add('hidden');
    }

    // Show Preview
    document.getElementById('nextBtn').addEventListener('click', () => {
        const fName = document.getElementById('fName').value;
        const lName = document.getElementById('lName').value;
        const aadharNum = document.getElementById('aadharNum').value;
        const photo = document.getElementById('photoData').value;

        if(!fName || !aadharNum || !photo) return alert("First Name, Aadhar, and Photo are mandatory!");

        let html = `
            <div class="row">
                <div class="col-8">
                    <p><strong>Name:</strong> ${fName} ${lName}</p>
                    <p><strong>Aadhar:</strong> ${aadharNum}</p>
                    <p><strong>Mobile:</strong> ${document.getElementById('mobile').value}</p>
                    <p><strong>DOB:</strong> ${document.getElementById('dob').value}</p>
                </div>
                <div class="col-4">
                    <img src="${photo}" class="img-thumbnail w-100">
                </div>
            </div>
        `;
        document.getElementById('preview-content').innerHTML = html;
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('preview-section').classList.remove('hidden');
    });

    // Edit Form
    document.getElementById('editBtn').addEventListener('click', () => {
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('preview-section').classList.add('hidden');
    });

    // Final Submit
    document.getElementById('finalSubmitBtn').addEventListener('click', async () => {
        const fName = document.getElementById('fName').value.trim().toUpperCase();
        const dob = document.getElementById('dob').value;
        const year = dob.split('-')[0];
        const pws = fName.substring(0, 4) + year;

        const payload = {
            teacherId: document.getElementById('aadharNum').value,
            password: pws,
            photo: document.getElementById('photoData').value,
            teacherName: {
                first: document.getElementById('fName').value,
                middle: document.getElementById('mName').value,
                last: document.getElementById('lName').value
            },
            fatherName: {
                first: document.getElementById('ffName').value,
                middle: document.getElementById('fmName').value,
                last: document.getElementById('flName').value
            },
            mobile: document.getElementById('mobile').value,
            altMobile: document.getElementById('altMobile').value,
            dob: dob,
            lastQualification: document.getElementById('qual').value,
            qualificationDoc: document.getElementById('qualData').value,
            aadharNumber: document.getElementById('aadharNum').value,
            aadharDoc: document.getElementById('aadharData').value
        };

        try {
            const res = await fetch('/api/teacher-register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const result = await res.json();
            if(result.success) {
                document.getElementById('preview-section').classList.add('hidden');
                document.getElementById('success-section').classList.remove('hidden');
                document.getElementById('resID').innerText = result.id;
                document.getElementById('resPWS').innerText = result.pws;
            } else {
                alert("Error: " + result.message);
            }
        } catch (err) {
            alert("Server Error. Please try again.");
        }
    });
</script>
</body>
</html>
