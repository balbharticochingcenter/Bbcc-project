<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration - Premium BBCC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .form-label { font-weight: 600; color: #555; font-size: 0.9rem; }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.3);
            background: #fdfbff;
        }
        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .hidden { display: none; }
        #camera-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3); text-align: center;
        }
        .preview-box img { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 3px solid #764ba2; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <div id="form-section" class="card glass-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Teacher Registration</h2>
                    <p class="text-muted">Please fill the details carefully. (Voice Guide Active 🔊)</p>
                </div>

                <form id="regForm">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">First Name</label>
                            <input type="text" id="fName" class="form-control voice-guide" data-msg="Yaha teacher ka first name likhe" placeholder="e.g. Rahul" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Middle Name</label>
                            <input type="text" id="mName" class="form-control voice-guide" data-msg="Agar koi middle name hai to yaha likhe" placeholder="e.g. Kumar">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lName" class="form-control voice-guide" data-msg="Yaha teacher ka last name yani surname likhe" placeholder="e.g. Sharma" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Father's First Name</label>
                            <input type="text" id="ffName" class="form-control voice-guide" data-msg="Yaha pitaji ka pehla naam likhe" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Father's Middle Name</label>
                            <input type="text" id="fmName" class="form-control voice-guide" data-msg="Pitaji ka middle name yaha likhe">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Father's Last Name</label>
                            <input type="text" id="flName" class="form-control voice-guide" data-msg="Pitaji ka last name yaha likhe" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Mobile Number</label>
                            <input type="number" id="mobile" class="form-control voice-guide" data-msg="Teacher ka mobile number dale" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Alternative Mobile</label>
                            <input type="number" id="altMobile" class="form-control voice-guide" data-msg="Koi dusra mobile number hai to yaha dale">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" id="dob" class="form-control voice-guide" data-msg="Teacher ki janm tithi chune" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Aadhar Number</label>
                            <input type="number" id="aadharNum" class="form-control voice-guide" data-msg="Barah anko ka aadhar number yaha bhare" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Qualification</label>
                            <input type="text" id="qual" class="form-control voice-guide" data-msg="Teacher ki akhiri padhai ki jankari de jaise B A ya M A" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Teacher Photo</label>
                            <input type="file" id="photoFile" class="form-control img-input" accept="image/*">
                            <button type="button" id="startCameraBtn" class="btn btn-sm btn-outline-secondary mt-2 w-100">Live Photo 📸</button>
                            <input type="hidden" id="photoData">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Aadhar Document</label>
                            <input type="file" id="aadharFile" class="form-control img-input voice-guide" data-msg="Aadhar card ki photo upload kare" accept="image/*">
                            <input type="hidden" id="aadharData">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Qualification Document</label>
                            <input type="file" id="qualFile" class="form-control img-input voice-guide" data-msg="Result ya degree ki photo upload kare" accept="image/*">
                            <input type="hidden" id="qualData">
                        </div>
                    </div>

                    <button type="button" id="nextBtn" class="btn btn-primary mt-5 w-100 shadow">PROCEED TO PREVIEW</button>
                </form>
            </div>

            <div id="preview-section" class="card glass-card p-4 p-md-5 hidden">
                <h3 class="text-center text-success fw-bold mb-4">Verification Preview</h3>
                <div id="preview-content" class="bg-light p-4 rounded mb-4"></div>
                <div class="row g-2">
                    <div class="col-6"><button id="editBtn" class="btn btn-warning w-100 fw-bold">EDIT DATA</button></div>
                    <div class="col-6"><button id="finalSubmitBtn" class="btn btn-success w-100 fw-bold">CONFIRM & SUBMIT</button></div>
                </div>
            </div>

            <div id="success-section" class="card glass-card p-5 text-center hidden">
                <div class="mb-4">
                    <img src="https://cdn-icons-png.flaticon.com/512/148/148767.png" width="80" alt="Success">
                </div>
                <h2 class="text-success fw-bold">Registration Success!</h2>
                <div class="alert alert-light border my-4 py-3">
                    <p class="mb-1 text-muted">Unique ID (Aadhar):</p>
                    <h4 class="fw-bold text-dark" id="resID"></h4>
                    <hr>
                    <p class="mb-1 text-muted">Your Password:</p>
                    <h4 class="fw-bold text-primary" id="resPWS"></h4>
                </div>
                <p class="text-danger fw-bold">⚠️ Take a Screenshot of this page right now!</p>
            </div>

        </div>
    </div>
</div>

<div id="camera-modal" class="hidden">
    <h5 class="mb-3">Capture Teacher Photo</h5>
    <video id="video" autoplay playsinline style="width: 100%; max-width: 350px; border-radius: 15px; background: #000;"></video>
    <div class="mt-3">
        <button id="captureBtn" class="btn btn-danger px-4">CAPTURE</button>
        <button id="closeCameraBtn" class="btn btn-secondary px-4">CANCEL</button>
    </div>
</div>

<script>
    // --- Voice Guidance Logic ---
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Stop any previous speech
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'hi-IN'; // Hindi Language
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }
    }

    // Attach voice to all fields with 'voice-guide' class
    document.querySelectorAll('.voice-guide').forEach(element => {
        element.addEventListener('focus', () => {
            const message = element.getAttribute('data-msg');
            if(message) speak(message);
        });
    });

    // --- Standard Logic (Previous Code Refined) ---
    let stream = null;

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 500; canvas.height = 500;
                    ctx.drawImage(img, 0, 0, 500, 500);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    document.querySelectorAll('.img-input').forEach(input => {
        input.addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                const compressed = await compressImage(e.target.files[0]);
                document.getElementById(e.target.id.replace('File', 'Data')).value = compressed;
            }
        });
    });

    document.getElementById('startCameraBtn').addEventListener('click', async () => {
        speak("Camera chalu ho raha hai, seedhe dekhiye");
        document.getElementById('camera-modal').classList.remove('hidden');
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('video').srcObject = stream;
    });

    document.getElementById('captureBtn').addEventListener('click', () => {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = 500; canvas.height = 500;
        canvas.getContext('2d').drawImage(video, 0, 0, 500, 500);
        document.getElementById('photoData').value = canvas.toDataURL('image/jpeg', 0.8);
        stopCamera();
        speak("Photo khinch li gayi hai");
    });

    document.getElementById('closeCameraBtn').addEventListener('click', stopCamera);

    function stopCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('camera-modal').classList.add('hidden');
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        const fName = document.getElementById('fName').value;
        const photo = document.getElementById('photoData').value;
        
        if(!fName || !photo) {
            speak("Kripya photo aur naam bhariye");
            return alert("First Name and Photo are Required!");
        }

        speak("Kripya apni jankari check kare aur submit kare");
        
        let html = `
            <div class="row align-items-center">
                <div class="col-md-8">
                    <p><strong>Teacher:</strong> ${fName} ${document.getElementById('lName').value}</p>
                    <p><strong>Father:</strong> ${document.getElementById('ffName').value}</p>
                    <p><strong>Aadhar:</strong> ${document.getElementById('aadharNum').value}</p>
                    <p><strong>Mobile:</strong> ${document.getElementById('mobile').value}</p>
                </div>
                <div class="col-md-4 text-center preview-box">
                    <img src="${photo}">
                </div>
            </div>
        `;
        document.getElementById('preview-content').innerHTML = html;
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('preview-section').classList.remove('hidden');
    });

    document.getElementById('editBtn').addEventListener('click', () => {
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('preview-section').classList.add('hidden');
    });

    document.getElementById('finalSubmitBtn').addEventListener('click', async () => {
        const fName = document.getElementById('fName').value.toUpperCase();
        const dob = document.getElementById('dob').value;
        const year = dob.split('-')[0];
        const pws = fName.substring(0, 4) + year;

        const payload = {
            teacherId: document.getElementById('aadharNum').value,
            password: pws,
            photo: document.getElementById('photoData').value,
            teacherName: {
                first: document.getElementById('fName').value,
                middle: document.getElementById('mName').value,
                last: document.getElementById('lName').value
            },
            fatherName: {
                first: document.getElementById('ffName').value,
                middle: document.getElementById('fmName').value,
                last: document.getElementById('flName').value
            },
            mobile: document.getElementById('mobile').value,
            altMobile: document.getElementById('altMobile').value,
            dob: dob,
            lastQualification: document.getElementById('qual').value,
            qualificationDoc: document.getElementById('qualData').value,
            aadharNumber: document.getElementById('aadharNum').value,
            aadharDoc: document.getElementById('aadharData').value
        };

        try {
            const res = await fetch('/api/teacher-register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if(result.success) {
                speak("Badhai ho, registration saphal hua. Screenshot le lijiye");
                document.getElementById('preview-section').classList.add('hidden');
                document.getElementById('success-section').classList.remove('hidden');
                document.getElementById('resID').innerText = result.id;
                document.getElementById('resPWS').innerText = result.pws;
            } else {
                alert(result.message);
            }
        } catch (e) { alert("Server Error!"); }
    });
</script>

</body>
</html>
