<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - BBCC Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ===== PREMIUM THEME VARIABLES ===== */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
            --gradient-3: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            --border-radius: 1rem;
            --border-radius-sm: 0.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="40" fill="rgba(255,255,255,0.05)"/><circle cx="50" cy="50" r="20" fill="rgba(255,255,255,0.03)"/><circle cx="150" cy="150" r="60" fill="rgba(255,255,255,0.02)"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== PREMIUM LOGIN SECTION ===== */
        .login-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            max-width: 450px;
            margin: 100px auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(0);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-section:hover {
            transform: translateY(-5px);
        }

        .login-section h2 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .login-section h2 i {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 10px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .login-form input {
            padding: 1rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .login-form input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .login-form button {
            padding: 1rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .login-form button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-form button:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-colored);
        }

        /* ===== PREMIUM DASHBOARD HEADER ===== */
        .dashboard-section {
            display: none;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            margin-right: 10px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .add-student-btn, .logout-btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .add-student-btn {
            background: var(--gradient-2);
            color: white;
        }

        .logout-btn {
            background: var(--gradient-3);
            color: white;
        }

        .add-student-btn:hover, .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== PREMIUM SEARCH AREA ===== */
        .search-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.5s ease 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-area h3 {
            color: var(--dark);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-area h3 i {
            color: var(--primary);
        }

        .search-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-row select, .search-row input {
            flex: 1;
            min-width: 200px;
            padding: 1rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
        }

        .search-row select:focus, .search-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .search-btn, .reset-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
            justify-content: center;
        }

        .search-btn {
            background: var(--primary);
            color: white;
        }

        .reset-btn {
            background: var(--gray);
            color: white;
        }

        .search-btn:hover, .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== PREMIUM STATS CARDS ===== */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
        }

        .stat-card:nth-child(2)::before {
            background: var(--gradient-2);
        }

        .stat-card:nth-child(3)::before {
            background: var(--gradient-3);
        }

        .stat-card:nth-child(4)::before {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-xl);
        }

        .stat-card i {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:nth-child(2) i {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card:nth-child(3) i {
            background: var(--gradient-3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card h4 {
            color: var(--gray);
            font-size: 1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card p {
            color: var(--dark);
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        /* ===== PREMIUM STUDENTS GRID ===== */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .student-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
        }

        .student-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-xl);
        }

        .student-card.selected {
            border: 3px solid var(--primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        }

        .student-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            display: block;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease;
        }

        .student-card:hover img {
            transform: scale(1.1);
        }

        .student-card h4 {
            color: var(--dark);
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .student-card .student-id {
            color: var(--gray);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .student-card .student-class {
            color: var(--primary);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .student-card .fees-badge {
            display: block;
            padding: 0.6rem;
            background: var(--gradient-1);
            color: white;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            margin-top: 1rem;
            box-shadow: var(--shadow);
        }

        .student-card .status-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: var(--shadow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255,255,255,0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255,255,255,0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255,255,255,0);
            }
        }

        .status-paid {
            background: var(--success);
        }

        .status-partial {
            background: var(--warning);
        }

        .status-unpaid {
            background: var(--danger);
        }

        .student-card-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            justify-content: center;
        }

        .edit-card-btn, .delete-card-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
            flex: 1;
            justify-content: center;
        }

        .edit-card-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }

        .delete-card-btn {
            background: linear-gradient(135deg, #ef4444 0%, #ec4899 100%);
            color: white;
        }

        .edit-card-btn:hover, .delete-card-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== PREMIUM STUDENT DETAILS ===== */
        .student-details {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.5s ease;
        }

        .details-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
        }

        .details-header img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
        }

        .basic-info {
            flex: 1;
        }

        .basic-info h2 {
            color: var(--dark);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .basic-info p {
            color: var(--gray);
            margin: 0.5rem 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .basic-info i {
            color: var(--primary);
            width: 20px;
        }

        .details-actions {
            display: flex;
            gap: 1rem;
        }

        .edit-details-btn, .delete-details-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .edit-details-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
        }

        .delete-details-btn {
            background: linear-gradient(135deg, #ef4444 0%, #ec4899 100%);
            color: white;
        }

        .edit-details-btn:hover, .delete-details-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(236, 72, 153, 0.05) 100%);
            padding: 1.5rem;
            border-radius: var(--border-radius-sm);
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .info-card h3 {
            color: var(--dark);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card h3 i {
            color: var(--primary);
        }

        .info-card p {
            color: var(--gray);
            margin: 0.8rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card i {
            color: var(--primary);
            width: 20px;
        }

        /* ===== PREMIUM DOCUMENT PREVIEW ===== */
        .document-preview {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(236, 72, 153, 0.05) 100%);
            border-radius: var(--border-radius);
            border: 2px dashed var(--primary);
        }

        .document-preview h4 {
            color: var(--dark);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .document-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .document-preview img:hover {
            transform: scale(1.02);
        }

        .document-preview iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow);
        }

        .document-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .view-document, .download-document {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            flex: 1;
            justify-content: center;
        }

        .view-document {
            background: var(--primary);
            color: white;
        }

        .download-document {
            background: var(--success);
            color: white;
        }

        .view-document:hover, .download-document:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .view-aadhar {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .view-aadhar:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-colored);
        }

        /* ===== PREMIUM CHART ===== */
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .chart-container h3 {
            color: var(--dark);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container h3 i {
            color: var(--primary);
        }

        canvas {
            max-height: 400px;
            width: 100% !important;
        }

        .fees-tracker-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .fees-tracker-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .fees-tracker-btn:hover::before {
            width: 500px;
            height: 500px;
        }

        .fees-tracker-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-colored);
        }

        /* ===== PREMIUM MODALS ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            margin: 50px auto;
            padding: 2.5rem;
            border-radius: var(--border-radius);
            max-width: 1000px;
            width: 95%;
            position: relative;
            animation: modalSlideDown 0.4s ease;
            box-shadow: var(--shadow-xl);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes modalSlideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--gray);
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            transform: rotate(90deg);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
        }

        .modal-header img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow-lg);
        }

        .modal-header-info h3 {
            color: var(--dark);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-header-info p {
            color: var(--gray);
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header-info i {
            color: var(--primary);
            width: 20px;
        }

        /* ===== PREMIUM FEES TABLE ===== */
        .fees-table-container {
            overflow-x: auto;
            border-radius: var(--border-radius);
            border: 1px solid rgba(99, 102, 241, 0.2);
            background: white;
        }

        .fees-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        .fees-table th {
            background: var(--gradient-1);
            color: white;
            padding: 1.2rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fees-table td {
            padding: 1.2rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
        }

        .fees-table tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .month-name {
            font-weight: 700;
            color: var(--dark);
        }

        .fees-input {
            width: 120px;
            padding: 0.6rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 2rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .fees-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .due-amount {
            font-weight: 700;
            color: var(--danger);
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .status-paid {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-partial {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .status-unpaid {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .save-fees {
            padding: 0.6rem 1.2rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .save-fees:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: #0d9488;
        }

        /* ===== PREMIUM FILE UPLOAD ===== */
        .file-upload {
            margin-bottom: 1rem;
        }

        .file-upload label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
        }

        .file-upload input[type="file"] {
            width: 100%;
            padding: 1rem;
            border: 2px dashed var(--primary);
            border-radius: var(--border-radius-sm);
            background: rgba(99, 102, 241, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload input[type="file"]:hover {
            border-color: var(--secondary);
            background: rgba(236, 72, 153, 0.05);
        }

        .file-upload small {
            display: block;
            color: var(--gray);
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .preview-container {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(99, 102, 241, 0.05);
            border-radius: var(--border-radius-sm);
            text-align: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow);
        }

        .preview-container iframe {
            width: 100%;
            height: 300px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius-sm);
        }

        /* ===== PREMIUM FORMS ===== */
        .edit-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-height: 70vh;
            overflow-y: auto;
            padding: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-actions {
            grid-column: span 2;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid rgba(99, 102, 241, 0.2);
        }

        .save-changes-btn, .cancel-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-changes-btn {
            background: var(--success);
            color: white;
        }

        .cancel-btn {
            background: var(--gray);
            color: white;
        }

        .save-changes-btn:hover, .cancel-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 2rem;
            background: white;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        .toast.warning {
            border-left-color: var(--warning);
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error i {
            color: var(--danger);
        }

        .toast.warning i {
            color: var(--warning);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== CONFIRM DIALOG ===== */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .confirm-content {
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .confirm-content i {
            font-size: 4rem;
            color: var(--warning);
            margin-bottom: 1rem;
        }

        .confirm-content h3 {
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .confirm-content p {
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .confirm-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .confirm-yes, .confirm-no {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .confirm-yes {
            background: var(--danger);
            color: white;
        }

        .confirm-no {
            background: var(--gray);
            color: white;
        }

        .confirm-yes:hover, .confirm-no:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* ===== NO DATA ===== */
        .no-data {
            text-align: center;
            padding: 4rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            grid-column: 1 / -1;
        }

        .no-data i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .no-data p {
            color: var(--gray);
            font-size: 1.2rem;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 4rem;
            color: white;
        }

        .loading i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .details-header {
                flex-direction: column;
                text-align: center;
            }

            .details-actions {
                margin-left: 0;
                width: 100%;
                justify-content: center;
            }

            .modal-header {
                flex-direction: column;
                text-align: center;
            }

            .edit-form {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .form-actions {
                grid-column: span 1;
                flex-direction: column;
            }

            .form-actions button {
                width: 100%;
            }

            .document-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2><i class="fas fa-graduation-cap"></i> Admin Login</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div class="dashboard-section" id="dashboardSection">
            <div class="header">
                <h1><i class="fas fa-chart-line"></i> Student Dashboard - Fees Tracker</h1>
                <div class="header-actions">
                    <button class="add-student-btn" id="addStudentBtn">
                        <i class="fas fa-plus"></i> Add Student
                    </button>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Search Area -->
            <div class="search-area">
                <h3><i class="fas fa-search"></i> Search Students</h3>
                <div class="search-row">
                    <select id="boardSelect">
                        <option value="all">All Boards</option>
                    </select>
                    <select id="classSelect">
                        <option value="all">All Classes</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search by Name or ID...">
                    <button class="search-btn" id="searchBtn">
                        <i class="fas fa-search"></i> Search
                    </button>
                    <button class="reset-btn" id="resetBtn">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <h4>Total Students</h4>
                    <p id="totalStudents">0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-rupee-sign"></i>
                    <h4>Total Collected</h4>
                    <p id="totalFees">₹0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <h4>Pending Fees</h4>
                    <p id="pendingFees">₹0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <h4>Fully Paid</h4>
                    <p id="fullyPaid">0</p>
                </div>
            </div>

            <!-- Students Grid -->
            <div id="studentsGrid" class="students-grid"></div>

            <!-- Student Details -->
            <div id="studentDetails" style="display: none;">
                <div class="student-details" id="studentInfo"></div>
                
                <!-- Fees Tracker Button -->
                <button class="fees-tracker-btn" id="feesTrackerBtn">
                    <i class="fas fa-rupee-sign"></i> Open Fees Tracker
                </button>

                <!-- Chart -->
                <div class="chart-container">
                    <h3><i class="fas fa-chart-bar"></i> Fees Payment History</h3>
                    <canvas id="feesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Fees Tracker Modal -->
    <div id="feesModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="modal-header" id="modalHeader"></div>
            <div class="fees-table-container">
                <table class="fees-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Year</th>
                            <th>Class Fees</th>
                            <th>Paid (₹)</th>
                            <th>Due (₹)</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="feesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div id="editStudentModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeEditModal">&times;</span>
            <h2><i class="fas fa-edit"></i> Edit Student</h2>
            <form id="editStudentForm" class="edit-form">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="editStudentId" readonly>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="text" id="editPassword" required>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" id="editMiddleName">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" required>
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="editMobile" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="text" id="editAadhar" maxlength="12" required>
                </div>
                <div class="form-group full-width">
                    <label>Photo</label>
                    <div class="file-upload">
                        <input type="file" id="editPhotoFile" accept="image/*">
                    </div>
                    <input type="hidden" id="editPhoto">
                    <div class="preview-container" id="editPhotoPreview"></div>
                </div>
                <div class="form-group full-width">
                    <label>Aadhar Document</label>
                    <div class="file-upload">
                        <input type="file" id="editAadharFile" accept="image/*,.pdf">
                    </div>
                    <input type="hidden" id="editAadharDoc">
                    <div class="preview-container" id="editAadharPreview"></div>
                </div>
                <div class="form-group">
                    <label>Registration Date</label>
                    <input type="date" id="editRegDate" required>
                </div>
                <div class="form-group">
                    <label>Joining Date</label>
                    <input type="date" id="editJoinDate" required>
                </div>
                <div class="form-group">
                    <label>Monthly Fees</label>
                    <input type="number" id="editFees" required>
                </div>
                <div class="form-group">
                    <label>Father First Name</label>
                    <input type="text" id="editFatherFirstName" required>
                </div>
                <div class="form-group">
                    <label>Father Middle Name</label>
                    <input type="text" id="editFatherMiddleName">
                </div>
                <div class="form-group">
                    <label>Father Last Name</label>
                    <input type="text" id="editFatherLastName" required>
                </div>
                <div class="form-group">
                    <label>Father Mobile</label>
                    <input type="text" id="editFatherMobile" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label>Mother First Name</label>
                    <input type="text" id="editMotherFirstName">
                </div>
                <div class="form-group">
                    <label>Mother Middle Name</label>
                    <input type="text" id="editMotherMiddleName">
                </div>
                <div class="form-group">
                    <label>Mother Last Name</label>
                    <input type="text" id="editMotherLastName">
                </div>
                <div class="form-group full-width">
                    <label>Current Address</label>
                    <textarea id="editCurrentAddress" rows="2" required></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Permanent Address</label>
                    <textarea id="editPermanentAddress" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>Board</label>
                    <input type="text" id="editBoard" required>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="editClass" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="save-changes-btn" id="saveChangesBtn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <button type="button" class="cancel-btn" id="cancelEditBtn">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeAddModal">&times;</span>

                <div class="form-group">
                    <label>Last Name *</label>

                </div>
                <div class="form-group">

                    <input type="text" id="addMobile" maxlength="10" required>

                <div class="form-group">

                    <div class="file-upload">

                    <input type="hidden" id="addPhoto">
                    <div class="preview-container" id="addPhotoPreview"></div>
                </div>
                <div class="form-group full-width">

                        <input type="file" id="addAadharFile" accept="image/*,.pdf" required>
                    </div>
                    <input type="hidden" id="addAadharDoc">
                    <div class="preview-container" id="addAadharPreview"></div>

                <div class="form-group">

                    <input type="date" id="addRegDate" required>
                </div>
                <div class="form-group">

                    <input type="date" id="addJoinDate" required>
                </div>
                <div class="form-group">
                    <label>Monthly Fees *</label>
                    <input type="number" id="addFees" required>
                </div>
                <div class="form-group">
                    <label>Father First Name *</label>
                    <input type="text" id="addFatherFirstName" required>
