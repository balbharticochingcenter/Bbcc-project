                <div class="form-group">
                    <label>Father Middle Name</label>
                    <input type="text" id="addFatherMiddleName">
                </div>
                <div class="form-group">
                    <label>Father Last Name *</label>
                    <input type="text" id="addFatherLastName" required>
                </div>
                <div class="form-group">
                    <label>Father Mobile *</label>
                    <input type="text" id="addFatherMobile" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label>Mother First Name</label>
                    <input type="text" id="addMotherFirstName">
                </div>
                <div class="form-group">
                    <label>Mother Middle Name</label>
                    <input type="text" id="addMotherMiddleName">
                </div>
                <div class="form-group">
                    <label>Mother Last Name</label>
                    <input type="text" id="addMotherLastName">
                </div>
                <div class="form-group full-width">
                    <label>Current Address *</label>
                    <textarea id="addCurrentAddress" rows="2" required></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Permanent Address *</label>
                    <textarea id="addPermanentAddress" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>Board *</label>
                    <input type="text" id="addBoard" required>
                </div>
                <div class="form-group">
                    <label>Class *</label>
                    <input type="text" id="addClass" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="save-changes-btn" id="addStudentSubmitBtn">
                        <i class="fas fa-plus"></i> Add Student
                    </button>
                    <button type="button" class="cancel-btn" id="cancelAddBtn">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Document Viewer Modal -->
    <div id="documentViewerModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeDocumentModal">&times;</span>
            <h3 id="documentTitle"></h3>
            <div id="documentContent"></div>
            <div class="document-actions">
                <button class="download-document" id="downloadDocumentBtn">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>
    </div>

    <!-- Confirmation Dialog -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-content">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Are you sure?</h3>
            <p id="confirmMessage">This action cannot be undone.</p>
            <div class="confirm-actions">
                <button class="confirm-yes" id="confirmYes">Yes, Delete</button>
                <button class="confirm-no" id="confirmNo">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ===== GLOBAL VARIABLES =====
        let token = localStorage.getItem('token');
        let selectedStudent = null;
        let chart = null;
        let allStudents = [];
        let filteredStudents = [];
        let deleteCallback = null;

        // ===== DOM ELEMENTS =====
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const addStudentBtn = document.getElementById('addStudentBtn');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const feesTrackerBtn = document.getElementById('feesTrackerBtn');
        const closeModal = document.getElementById('closeModal');
        const closeEditModal = document.getElementById('closeEditModal');
        const closeAddModal = document.getElementById('closeAddModal');
        const closeDocumentModal = document.getElementById('closeDocumentModal');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        const saveChangesBtn = document.getElementById('saveChangesBtn');
        const addStudentSubmitBtn = document.getElementById('addStudentSubmitBtn');
        const downloadDocumentBtn = document.getElementById('downloadDocumentBtn');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');
        const boardSelect = document.getElementById('boardSelect');
        const classSelect = document.getElementById('classSelect');
        const searchInput = document.getElementById('searchInput');

        // File upload elements
        const addPhotoFile = document.getElementById('addPhotoFile');
        const addAadharFile = document.getElementById('addAadharFile');
        const editPhotoFile = document.getElementById('editPhotoFile');
        const editAadharFile = document.getElementById('editAadharFile');

        // ===== EVENT LISTENERS =====
        loginBtn.addEventListener('click', login);
        logoutBtn.addEventListener('click', logout);
        addStudentBtn.addEventListener('click', openAddStudentModal);
        searchBtn.addEventListener('click', searchStudents);
        resetBtn.addEventListener('click', resetFilters);
        feesTrackerBtn.addEventListener('click', openFeesModal);
        closeModal.addEventListener('click', closeFeesModal);
        closeEditModal.addEventListener('click', closeEditStudentModal);
        closeAddModal.addEventListener('click', closeAddStudentModal);
        closeDocumentModal.addEventListener('click', closeDocumentViewer);
        cancelEditBtn.addEventListener('click', closeEditStudentModal);
        cancelAddBtn.addEventListener('click', closeAddStudentModal);
        saveChangesBtn.addEventListener('click', saveStudentChanges);
        addStudentSubmitBtn.addEventListener('click', addNewStudent);
        downloadDocumentBtn.addEventListener('click', downloadDocument);
        confirmNo.addEventListener('click', hideConfirmDialog);
        boardSelect.addEventListener('change', loadClasses);
        classSelect.addEventListener('change', searchStudents);
        searchInput.addEventListener('keyup', (e) => e.key === 'Enter' && searchStudents());

        // File upload handlers
        addPhotoFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'addPhoto', 'addPhotoPreview'));
        addAadharFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'addAadharDoc', 'addAadharPreview'));
        editPhotoFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'editPhoto', 'editPhotoPreview'));
        editAadharFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'editAadharDoc', 'editAadharPreview'));

        // Close modals on outside click
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('feesModal')) closeFeesModal();
            if (e.target === document.getElementById('editStudentModal')) closeEditStudentModal();
            if (e.target === document.getElementById('addStudentModal')) closeAddStudentModal();
            if (e.target === document.getElementById('documentViewerModal')) closeDocumentViewer();
        });

        // Check token on load
        if (token) verifyToken();

        // ===== UTILITY FUNCTIONS =====

        // Handle file upload and convert to Base64
        function handleFileUpload(file, inputId, previewId) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(inputId).value = e.target.result;
                showPreview(e.target.result, previewId, file.type);
            };
            reader.readAsDataURL(file);
        }

        // Show preview of uploaded file
        function showPreview(data, previewId, fileType) {
            const preview = document.getElementById(previewId);
            if (fileType.startsWith('image/')) {
                preview.innerHTML = `<img src="${data}" alt="Preview">`;
            } else if (fileType === 'application/pdf') {
                preview.innerHTML = `<iframe src="${data}" style="width:100%; height:300px; border:1px solid #ddd; border-radius:5px;"></iframe>`;
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Show confirmation dialog
        function showConfirmDialog(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmDialog').style.display = 'flex';
            deleteCallback = callback;
        }

        function hideConfirmDialog() {
            document.getElementById('confirmDialog').style.display = 'none';
            deleteCallback = null;
        }

        confirmYes.addEventListener('click', () => {
            if (deleteCallback) deleteCallback();
            hideConfirmDialog();
        });

        // Download document function
        function downloadDoc(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename || 'document';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // ===== AUTHENTICATION FUNCTIONS =====

        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) return showToast('Please enter username and password', 'warning');

            try {
                const res = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userid: username, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    loadAllStudents();
                    loadBoards();
                    showToast('Login successful!');
                } else {
                    showToast('Wrong username or password!', 'error');
                    localStorage.removeItem('token');
                }
            } catch (error) {
                showToast('Login failed', 'error');
            }
        }

        // Verify token
        async function verifyToken() {
            try {
                const res = await fetch('/api/verify-token', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    loadAllStudents();
                    loadBoards();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                }
            } catch (error) {
                localStorage.removeItem('token');
                token = null;
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            token = null;
            loginSection.style.display = 'block';
            dashboardSection.style.display = 'none';
            showToast('Logged out successfully');
        }

        // ===== DATA LOADING FUNCTIONS =====

        // Load all students
        async function loadAllStudents() {
            try {
                const res = await fetch('/api/students', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    allStudents = data.data;
                    filteredStudents = allStudents;
                    displayStudents(filteredStudents);
                    updateStats();
                }
            } catch (error) {
                if (error.status === 401) logout();
            }
        }

        // Load boards
        async function loadBoards() {
            try {
                const res = await fetch('/api/boards', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    boardSelect.innerHTML = '<option value="all">All Boards</option>';
                    data.data.forEach(board => {
                        boardSelect.innerHTML += `<option value="${board}">${board}</option>`;
                    });
                }
            } catch (error) {
                console.error('Load boards error:', error);
            }
        }

        // Load classes
        async function loadClasses() {
            const board = boardSelect.value;
            if (board === 'all') {
                classSelect.innerHTML = '<option value="all">All Classes</option>';
                return;
            }
            try {
                const res = await fetch(`/api/classes/${encodeURIComponent(board)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    classSelect.innerHTML = '<option value="all">All Classes</option>';
                    data.data.forEach(cls => {
                        classSelect.innerHTML += `<option value="${cls}">${cls}</option>`;
                    });
                }
            } catch (error) {
                console.error('Load classes error:', error);
            }
        }

        // Search students
        async function searchStudents() {
            const board = boardSelect.value;
            const className = classSelect.value;
            const searchTerm = searchInput.value.toLowerCase();

            try {
                let url = '/api/students';
                if (board !== 'all' && className !== 'all') {
                    url = `/api/students/${encodeURIComponent(board)}/${encodeURIComponent(className)}`;
                }
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    let students = data.data;
                    if (searchTerm) {
                        students = students.filter(s => {
                            const name = `${s.studentName.first} ${s.studentName.middle} ${s.studentName.last}`.toLowerCase();
                            return name.includes(searchTerm) || s.studentId.toLowerCase().includes(searchTerm);
                        });
                    }
                    filteredStudents = students;
                    displayStudents(filteredStudents);
                    updateStats();
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        // Reset filters
        function resetFilters() {
            boardSelect.value = 'all';
            classSelect.innerHTML = '<option value="all">All Classes</option>';
            searchInput.value = '';
            loadAllStudents();
            showToast('Filters reset');
        }

        // ===== UI DISPLAY FUNCTIONS =====

        // Display students in grid
        function displayStudents(students) {
            const grid = document.getElementById('studentsGrid');
            if (students.length === 0) {
                grid.innerHTML = '<div class="no-data"><i class="fas fa-users-slash"></i><p>No students found</p></div>';
                return;
            }

            grid.innerHTML = '';
            students.forEach(student => {
                const fullName = `${student.studentName.first} ${student.studentName.middle} ${student.studentName.last}`.replace(/\s+/g, ' ').trim();
                let status = 'unpaid';
                if (student.feesHistory?.length) {
                    const latest = student.feesHistory[student.feesHistory.length - 1];
                    status = latest.status;
                }
                const statusClass = status === 'paid' ? 'status-paid' : status === 'partial' ? 'status-partial' : 'status-unpaid';

                const card = document.createElement('div');
                card.className = `student-card ${selectedStudent?.studentId === student.studentId ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="status-indicator ${statusClass}" title="Status: ${status}"></div>
                    <img src="${student.photo}" alt="${fullName}" onerror="this.src='https://via.placeholder.com/100'">
                    <h4>${fullName}</h4>
                    <div class="student-id"><i class="fas fa-id-card"></i> ${student.studentId}</div>
                    <div class="student-class"><i class="fas fa-graduation-cap"></i> ${student.education.board} - ${student.education.class}</div>
                    <span class="fees-badge"><i class="fas fa-rupee-sign"></i> ₹${student.classMonthlyFees}/month</span>
                    <div class="student-card-actions">
                        <button class="edit-card-btn" data-id="${student.studentId}"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-card-btn" data-id="${student.studentId}"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                `;

                card.addEventListener('click', (e) => !e.target.closest('button') && selectStudent(student.studentId));
                card.querySelector('.edit-card-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditStudentModal(student.studentId);
                });
                card.querySelector('.delete-card-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    showConfirmDialog(`Delete student ${fullName}?`, () => deleteStudent(student.studentId));
                });

                grid.appendChild(card);
            });
        }

        // Update statistics
        function updateStats() {
            let total = filteredStudents.length;
            let collected = 0, pending = 0, paid = 0;
            filteredStudents.forEach(s => {
                if (s.feesHistory?.length) {
                    const totalPaid = s.feesHistory.reduce((sum, f) => sum + f.paidAmount, 0);
                    const totalDue = s.feesHistory.reduce((sum, f) => sum + f.dueAmount, 0);
                    collected += totalPaid;
                    pending += totalDue;
                    if (s.feesHistory.every(f => f.status === 'paid')) paid++;
                }
            });
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('totalFees').textContent = `₹${collected}`;
            document.getElementById('pendingFees').textContent = `₹${pending}`;
            document.getElementById('fullyPaid').textContent = paid;
        }

        // Select student
        async function selectStudent(id) {
            try {
                const res = await fetch(`/api/student-dashboard/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    selectedStudent = data.data;
                    displayStudentDetails(selectedStudent);
                    displayStudents(filteredStudents);
                    document.getElementById('studentDetails').style.display = 'block';
                    updateChart(selectedStudent);
                    document.getElementById('studentDetails').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                if (error.status === 401) logout();
            }
        }

        // Display student details
        function displayStudentDetails(s) {
            const fullName = `${s.studentName.first} ${s.studentName.middle} ${s.studentName.last}`.replace(/\s+/g, ' ').trim();
            const father = `${s.fatherName.first} ${s.fatherName.middle} ${s.fatherName.last}`.trim();
            const mother = `${s.motherName.first} ${s.motherName.middle} ${s.motherName.last}`.trim() || 'Not Provided';
            const reg = new Date(s.registrationDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
            const join = new Date(s.joiningDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

            const isPDF = s.aadharDocument?.includes('application/pdf') || s.aadharDocument?.startsWith('data:application/pdf');
            const preview = isPDF ? 
                `<iframe src="${s.aadharDocument}" style="width:100%; height:300px; border:1px solid #ddd; border-radius:5px;"></iframe>` : 
                `<img src="${s.aadharDocument}" onclick="viewDocument('${s.aadharDocument}', 'Aadhar - ${fullName}')" style="cursor:pointer;">`;

            document.getElementById('studentInfo').innerHTML = `
                <div class="details-header">
                    <img src="${s.photo}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="basic-info">
                        <h2>${fullName}</h2>
                        <p><i class="fas fa-id-card"></i> ID: ${s.studentId}</p>
                        <p><i class="fas fa-id-card"></i> Aadhar: ${s.aadharNumber}</p>
                        <p><i class="fas fa-calendar"></i> Registration: ${reg}</p>
                        <p><i class="fas fa-calendar-check"></i> Joining: ${join}</p>
                    </div>
                    <div class="details-actions">
                        <button class="edit-details-btn" id="editDetailsBtn"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-details-btn" id="deleteDetailsBtn"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <h3><i class="fas fa-user-graduate"></i> Student</h3>
                        <p><i class="fas fa-phone"></i> ${s.mobile}</p>
                        <p><i class="fas fa-graduation-cap"></i> ${s.education.board} - ${s.education.class}</p>
                        <p><i class="fas fa-rupee-sign"></i> ₹${s.classMonthlyFees}</p>
                    </div>
                    <div class="info-card">
                        <h3><i class="fas fa-user-tie"></i> Father</h3>
                        <p><i class="fas fa-user"></i> ${father}</p>
                        <p><i class="fas fa-phone"></i> ${s.fatherMobile}</p>
                    </div>
                    <div class="info-card">
                        <h3><i class="fas fa-user"></i> Mother</h3>
                        <p><i class="fas fa-user"></i> ${mother}</p>
                    </div>
                    <div class="info-card">
                        <h3><i class="fas fa-map-marker-alt"></i> Address</h3>
                        <p><i class="fas fa-home"></i> Current: ${s.address.current}</p>
                        <p><i class="fas fa-home"></i> Permanent: ${s.address.permanent}</p>
                    </div>
                </div>
                <div class="document-preview">
                    <h4><i class="fas fa-id-card"></i> Aadhar Document</h4>
                    ${preview}
                    <div class="document-actions">
                        <button class="view-document" onclick="viewDocument('${s.aadharDocument}', 'Aadhar - ${fullName}')"><i class="fas fa-eye"></i> View</button>
                        <button class="download-document" onclick="downloadDoc('${s.aadharDocument}', '${s.studentId}_Aadhar')"><i class="fas fa-download"></i> Download</button>
                    </div>
                </div>
            `;
            document.getElementById('editDetailsBtn').addEventListener('click', () => openEditStudentModal(s.studentId));
            document.getElementById('deleteDetailsBtn').addEventListener('click', () => showConfirmDialog(`Delete ${fullName}?`, () => deleteStudent(s.studentId)));
        }

        // View document in modal
        function viewDocument(url, title) {
            document.getElementById('documentTitle').textContent = title;
            const isPDF = url.includes('application/pdf') || url.startsWith('data:application/pdf');
            document.getElementById('documentContent').innerHTML = isPDF ? 
                `<iframe src="${url}" style="width:100%; height:70vh; border:none;"></iframe>` : 
                `<img src="${url}" style="max-width:100%; max-height:70vh; display:block; margin:0 auto;">`;
            window.currentDoc = url;
            document.getElementById('documentViewerModal').style.display = 'block';
        }

        function closeDocumentViewer() {
            document.getElementById('documentViewerModal').style.display = 'none';
        }

        function downloadDocument() {
            if (window.currentDoc) downloadDoc(window.currentDoc, 'document');
        }

        // Update chart
        function updateChart(student) {
            if (!student.feesHistory?.length) {
                document.getElementById('feesChart').style.display = 'none';
                return;
            }
            document.getElementById('feesChart').style.display = 'block';
            const months = student.feesHistory.map(f => f.month);
            const paid = student.feesHistory.map(f => f.paidAmount);
            const due = student.feesHistory.map(f => f.dueAmount);
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('feesChart'), {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [
                        { label: 'Paid (₹)', data: paid, backgroundColor: '#10b981' },
                        { label: 'Due (₹)', data: due, backgroundColor: '#ef4444' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { 
                            position: 'top',
                            labels: { usePointStyle: true, padding: 20 }
                        }
                    }
                }
            });
        }

        // ===== FEES TRACKER FUNCTIONS =====

        // Open fees modal
        function openFeesModal() {
            if (!selectedStudent) return showToast('Select a student first', 'warning');
            const modal = document.getElementById('feesModal');
            const fullName = `${selectedStudent.studentName.first} ${selectedStudent.studentName.middle} ${selectedStudent.studentName.last}`.trim();
            document.getElementById('modalHeader').innerHTML = `
                <img src="${selectedStudent.photo}" onerror="this.src='https://via.placeholder.com/80'">
                <div class="modal-header-info">
                    <h3>${fullName}</h3>
                    <p><i class="fas fa-id-card"></i> ID: ${selectedStudent.studentId}</p>
                    <p><i class="fas fa-phone"></i> ${selectedStudent.mobile}</p>
                    <p><i class="fas fa-graduation-cap"></i> ${selectedStudent.education.board} - ${selectedStudent.education.class}</p>
                    <p><i class="fas fa-rupee-sign"></i> ₹${selectedStudent.classMonthlyFees}/month</p>
                </div>
            `;
            const tbody = document.getElementById('feesTableBody');
            tbody.innerHTML = '';
            
            // Generate all months from joining date to current date
            const joining = new Date(selectedStudent.joiningDate);
            const now = new Date();
            let current = new Date(joining);
            
            // Create map of existing fees history
            const history = selectedStudent.feesHistory || [];
            const historyMap = {};
            history.forEach(f => historyMap[f.month] = f);

            while (current <= now) {
                const monthName = current.toLocaleString('default', { month: 'long' });
                const year = current.getFullYear();
                const monthKey = `${monthName} ${year}`;
                const fee = historyMap[monthKey] || { paidAmount: 0, dueAmount: selectedStudent.classMonthlyFees, status: 'unpaid' };
                
                const statusClass = fee.status === 'paid' ? 'status-paid' : fee.status === 'partial' ? 'status-partial' : 'status-unpaid';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="month-name">${monthName}</td>
                    <td>${year}</td>
                    <td>₹${selectedStudent.classMonthlyFees}</td>
                    <td><input type="number" class="fees-input" id="paid-${monthKey}" value="${fee.paidAmount}" min="0" max="${selectedStudent.classMonthlyFees}" step="1"></td>
                    <td class="due-amount" id="due-${monthKey}">₹${fee.dueAmount}</td>
                    <td><span class="status-badge ${statusClass}">${fee.status}</span></td>
                    <td><button class="save-fees" data-month="${monthKey}"><i class="fas fa-save"></i> Save</button></td>
                `;
                tbody.appendChild(row);
                current.setMonth(current.getMonth() + 1);
            }

            // Add event listeners to save buttons
            tbody.querySelectorAll('.save-fees').forEach(btn => {
                btn.addEventListener('click', () => {
                    const month = btn.dataset.month;
                    const paid = parseFloat(document.getElementById(`paid-${month}`).value) || 0;
                    saveFees(month, paid);
                });
            });

            modal.style.display = 'block';
        }

        // Save fees
        async function saveFees(month, paid) {
            if (paid > selectedStudent.classMonthlyFees) {
                return showToast(`Max ₹${selectedStudent.classMonthlyFees}`, 'warning');
            }
            try {
                const res = await fetch(`/api/update-fees/${selectedStudent.studentId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ month, paidAmount: paid })
                });
                const data = await res.json();
                if (data.success) {
                    if (data.data && data.data.feesHistory) {
                        selectedStudent.feesHistory = data.data.feesHistory;
                        document.getElementById(`due-${month}`).innerHTML = `₹${selectedStudent.classMonthlyFees - paid}`;
                        updateChart(selectedStudent);
                        updateStats();
                        showToast('Fees updated successfully!');
                    } else {
                        showToast('Fees updated but data mismatch', 'warning');
                    }
                } else {
                    showToast(data.message || 'Update failed', 'error');
                }
            } catch (error) {
                showToast('Update failed', 'error');
            }
        }

        function closeFeesModal() {
            document.getElementById('feesModal').style.display = 'none';
        }

        // ===== EDIT STUDENT FUNCTIONS =====

        // Open edit student modal
        async function openEditStudentModal(id) {
            try {
                const res = await fetch(`/api/student-dashboard/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const s = data.data;
                    document.getElementById('editStudentId').value = s.studentId;
                    document.getElementById('editPassword').value = s.password;
                    document.getElementById('editFirstName').value = s.studentName.first;
                    document.getElementById('editMiddleName').value = s.studentName.middle || '';
                    document.getElementById('editLastName').value = s.studentName.last;
                    document.getElementById('editMobile').value = s.mobile;
                    document.getElementById('editAadhar').value = s.aadharNumber;
                    document.getElementById('editPhoto').value = s.photo;
                    document.getElementById('editAadharDoc').value = s.aadharDocument;
                    
                    // Show existing previews
                    if (s.photo) showPreview(s.photo, 'editPhotoPreview', 'image/jpeg');
                    if (s.aadharDocument) {
                        const type = s.aadharDocument.includes('pdf') ? 'application/pdf' : 'image/jpeg';
                        showPreview(s.aadharDocument, 'editAadharPreview', type);
                    }
                    
                    document.getElementById('editRegDate').value = new Date(s.registrationDate).toISOString().split('T')[0];
                    document.getElementById('editJoinDate').value = new Date(s.joiningDate).toISOString().split('T')[0];
                    document.getElementById('editFees').value = s.classMonthlyFees;
                    document.getElementById('editFatherFirstName').value = s.fatherName.first;
                    document.getElementById('editFatherMiddleName').value = s.fatherName.middle || '';
                    document.getElementById('editFatherLastName').value = s.fatherName.last;
                    document.getElementById('editFatherMobile').value = s.fatherMobile;
                    document.getElementById('editMotherFirstName').value = s.motherName.first || '';
                    document.getElementById('editMotherMiddleName').value = s.motherName.middle || '';
                    document.getElementById('editMotherLastName').value = s.motherName.last || '';
                    document.getElementById('editCurrentAddress').value = s.address.current;
                    document.getElementById('editPermanentAddress').value = s.address.permanent;
                    document.getElementById('editBoard').value = s.education.board;
                    document.getElementById('editClass').value = s.education.class;
                    document.getElementById('editStudentModal').style.display = 'block';
                }
            } catch (error) {
                showToast('Failed to load student', 'error');
            }
        }

        function closeEditStudentModal() {
            document.getElementById('editStudentModal').style.display = 'none';
            // Clear file inputs
            document.getElementById('editPhotoFile').value = '';
            document.getElementById('editAadharFile').value = '';
        }

        // Save student changes
        async function saveStudentChanges() {
            const id = document.getElementById('editStudentId').value;
            const data = {
                studentId: id,
                password: document.getElementById('editPassword').value,
                classMonthlyFees: parseInt(document.getElementById('editFees').value),
                photo: document.getElementById('editPhoto').value,
                student: {
                    firstName: document.getElementById('editFirstName').value,
                    middleName: document.getElementById('editMiddleName').value,
                    lastName: document.getElementById('editLastName').value,
                    mobile: document.getElementById('editMobile').value
                },
                aadhar: document.getElementById('editAadhar').value,
                aadharDocument: document.getElementById('editAadharDoc').value,
                dates: {
                    reg: document.getElementById('editRegDate').value,
                    join: document.getElementById('editJoinDate').value
                },
                father: {
                    firstName: document.getElementById('editFatherFirstName').value,
                    middleName: document.getElementById('editFatherMiddleName').value,
                    lastName: document.getElementById('editFatherLastName').value,
                    mobile: document.getElementById('editFatherMobile').value
                },
                mother: {
                    firstName: document.getElementById('editMotherFirstName').value,
                    middleName: document.getElementById('editMotherMiddleName').value,
                    lastName: document.getElementById('editMotherLastName').value
                },
                address: {
                    current: document.getElementById('editCurrentAddress').value,
                    permanent: document.getElementById('editPermanentAddress').value
                },
                education: {
                    board: document.getElementById('editBoard').value,
                    class: document.getElementById('editClass').value
                }
            };
            try {
                const res = await fetch(`/api/students/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if (resData.success) {
                    showToast('Student updated successfully!');
                    closeEditStudentModal();
                    loadAllStudents();
                    if (selectedStudent?.studentId === id) selectStudent(id);
                } else {
                    showToast(resData.message || 'Update failed', 'error');
                }
            } catch (error) {
                showToast('Update failed', 'error');
            }
        }

        // ===== ADD STUDENT FUNCTIONS =====

        // Open add student modal
        function openAddStudentModal() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('addRegDate').value = today;
            document.getElementById('addJoinDate').value = today;
            document.getElementById('addPhotoPreview').innerHTML = '';
            document.getElementById('addAadharPreview').innerHTML = '';
            document.getElementById('addStudentModal').style.display = 'block';
        }

        function closeAddStudentModal() {
            document.getElementById('addStudentModal').style.display = 'none';
            document.getElementById('addStudentForm').reset();
            document.getElementById('addPhotoPreview').innerHTML = '';
            document.getElementById('addAadharPreview').innerHTML = '';
        }

        // Add new student
        async function addNewStudent() {
            const required = ['addStudentId', 'addPassword', 'addFirstName', 'addLastName', 'addMobile', 'addAadhar', 'addPhoto', 'addAadharDoc', 'addRegDate', 'addJoinDate', 'addFees', 'addFatherFirstName', 'addFatherLastName', 'addFatherMobile', 'addCurrentAddress', 'addPermanentAddress', 'addBoard', 'addClass'];
            for (const f of required) {
                if (!document.getElementById(f).value) return showToast('Fill all required fields', 'warning');
            }
            const data = {
                studentId: document.getElementById('addStudentId').value,
                password: document.getElementById('addPassword').value,
                classMonthlyFees: parseInt(document.getElementById('addFees').value),
                photo: document.getElementById('addPhoto').value,
                student: {
                    firstName: document.getElementById('addFirstName').value,
                    middleName: document.getElementById('addMiddleName').value,
                    lastName: document.getElementById('addLastName').value,
                    mobile: document.getElementById('addMobile').value
                },
                aadhar: document.getElementById('addAadhar').value,
                aadharDocument: document.getElementById('addAadharDoc').value,
                dates: {
                    reg: document.getElementById('addRegDate').value,
                    join: document.getElementById('addJoinDate').value
                },
                father: {
                    firstName: document.getElementById('addFatherFirstName').value,
                    middleName: document.getElementById('addFatherMiddleName').value,
                    lastName: document.getElementById('addFatherLastName').value,
                    mobile: document.getElementById('addFatherMobile').value
                },
                mother: {
                    firstName: document.getElementById('addMotherFirstName').value,
                    middleName: document.getElementById('addMotherMiddleName').value,
                    lastName: document.getElementById('addMotherLastName').value
                },
                address: {
                    current: document.getElementById('addCurrentAddress').value,
                    permanent: document.getElementById('addPermanentAddress').value
                },
                education: {
                    board: document.getElementById('addBoard').value,
                    class: document.getElementById('addClass').value
                }
            };
            try {
                const res = await fetch('/api/student-register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if (resData.success) {
                    showToast('Student added successfully!');
                    closeAddStudentModal();
                    loadAllStudents();
                } else {
                    showToast(resData.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showToast('Add failed', 'error');
            }
        }

        // ===== DELETE STUDENT FUNCTION =====

        // Delete student
        async function deleteStudent(id) {
            try {
                const res = await fetch(`/api/students/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Student deleted successfully!');
                    if (selectedStudent?.studentId === id) {
                        selectedStudent = null;
                        document.getElementById('studentDetails').style.display = 'none';
                    }
                    loadAllStudents();
                } else {
                    showToast(data.message || 'Delete failed', 'error');
                }
            } catch (error) {
                showToast('Delete failed', 'error');
            }
        }
    </script>
