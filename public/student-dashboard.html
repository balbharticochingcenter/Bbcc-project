<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - BBCC Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Login Section */
        .login-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            margin: 50px auto;
        }

        .login-section h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .login-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Dashboard Section */
        .dashboard-section {
            display: none;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .add-student-btn, .logout-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-student-btn {
            background: #28a745;
            color: white;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
        }

        /* Search Area */
        .search-area {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-row select, .search-row input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-btn, .reset-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            min-width: 120px;
        }

        .search-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn {
            background: #6c757d;
            color: white;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card h4 {
            color: #666;
            font-size: 14px;
        }

        .stat-card p {
            color: #333;
            font-size: 24px;
            font-weight: 700;
        }

        /* Students Grid */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .student-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .student-card.selected {
            border: 3px solid #667eea;
            background: #f8f9ff;
        }

        .student-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            border: 3px solid #667eea;
        }

        .student-card h4 {
            color: #333;
            text-align: center;
        }

        .student-id, .student-class {
            color: #666;
            text-align: center;
            margin: 5px 0;
        }

        .fees-badge {
            display: block;
            margin-top: 10px;
            padding: 5px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            text-align: center;
        }

        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-paid { background: #28a745; }
        .status-partial { background: #ffc107; }
        .status-unpaid { background: #dc3545; }

        .student-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-card-btn, .delete-card-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .edit-card-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-card-btn {
            background: #dc3545;
            color: white;
        }

        /* Student Details */
        .student-details {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .details-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .details-header img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
        }

        .basic-info h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .basic-info p {
            color: #666;
            margin: 5px 0;
        }

        .basic-info i {
            color: #667eea;
            width: 25px;
        }

        .details-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .edit-details-btn, .delete-details-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-details-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-details-btn {
            background: #dc3545;
            color: white;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-card h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card p {
            color: #666;
            margin: 10px 0;
        }

        .info-card i {
            color: #667eea;
            width: 25px;
        }

        /* Document Preview */
        .document-preview {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 2px dashed #667eea;
        }

        .document-preview h4 {
            color: #333;
            margin-bottom: 15px;
        }

        .document-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            cursor: pointer;
        }

        .document-preview iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 5px;
        }

        .document-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .view-document, .download-document {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .view-document {
            background: #667eea;
            color: white;
        }

        .download-document {
            background: #28a745;
            color: white;
        }

        /* Chart */
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        canvas {
            max-height: 400px;
            width: 100% !important;
        }

        /* Fees Tracker Button */
        .fees-tracker-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 1000px;
            width: 95%;
            position: relative;
        }

        .close {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .modal-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .modal-header-info h3 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .modal-header-info p {
            color: #666;
            margin: 3px 0;
        }

        /* Fees Table */
        .fees-table-container {
            overflow-x: auto;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .fees-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        .fees-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
        }

        .fees-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .fees-table tr:hover {
            background: #f8f9ff;
        }

        .month-name {
            font-weight: 600;
            color: #333;
        }

        .fees-input {
            width: 120px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .fees-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .due-amount {
            font-weight: 600;
            color: #dc3545;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .status-partial {
            background: #fff3cd;
            color: #856404;
        }

        .status-unpaid {
            background: #f8d7da;
            color: #721c24;
        }

        .save-fees {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* File Upload */
        .file-upload {
            margin-bottom: 15px;
        }

        .file-upload input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #667eea;
            border-radius: 5px;
            background: #f8f9ff;
        }

        .preview-container {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 5px;
            text-align: center;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 5px;
        }

        .preview-container iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        /* Edit Form */
        .edit-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-actions {
            grid-column: span 2;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .save-changes-btn, .cancel-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-changes-btn {
            background: #28a745;
            color: white;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideIn 0.3s;
        }

        .toast.success { border-left: 4px solid #28a745; }
        .toast.error { border-left: 4px solid #dc3545; }
        .toast.warning { border-left: 4px solid #ffc107; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Confirm Dialog */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .confirm-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .confirm-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .confirm-yes, .confirm-no {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .confirm-yes {
            background: #dc3545;
            color: white;
        }

        .confirm-no {
            background: #6c757d;
            color: white;
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 50px;
            color: #666;
            background: white;
            border-radius: 15px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .edit-form {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2><i class="fas fa-graduation-cap"></i> Admin Login</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div class="dashboard-section" id="dashboardSection">
            <div class="header">
                <h1><i class="fas fa-chart-line"></i> Student Dashboard - Fees Tracker</h1>
                <div class="header-actions">
                    <button class="add-student-btn" id="addStudentBtn">
                        <i class="fas fa-plus"></i> Add Student
                    </button>
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Search Area -->
            <div class="search-area">
                <h3><i class="fas fa-search"></i> Search Students</h3>
                <div class="search-row">
                    <select id="boardSelect">
                        <option value="all">All Boards</option>
                    </select>
                    <select id="classSelect">
                        <option value="all">All Classes</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search by Name or ID...">
                    <button class="search-btn" id="searchBtn">
                        <i class="fas fa-search"></i> Search
                    </button>
                    <button class="reset-btn" id="resetBtn">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-container">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <h4>Total Students</h4>
                    <p id="totalStudents">0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-rupee-sign"></i>
                    <h4>Total Collected</h4>
                    <p id="totalFees">₹0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <h4>Pending Fees</h4>
                    <p id="pendingFees">₹0</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <h4>Fully Paid</h4>
                    <p id="fullyPaid">0</p>
                </div>
            </div>

            <!-- Students Grid -->
            <div id="studentsGrid" class="students-grid"></div>

            <!-- Student Details -->
            <div id="studentDetails" style="display: none;">
                <div class="student-details" id="studentInfo"></div>
                
                <!-- Fees Tracker Button -->
                <button class="fees-tracker-btn" id="feesTrackerBtn">
                    <i class="fas fa-rupee-sign"></i> Open Fees Tracker
                </button>

                <!-- Chart -->
                <div class="chart-container">
                    <h3><i class="fas fa-chart-bar"></i> Fees Payment History</h3>
                    <canvas id="feesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Fees Tracker Modal -->
    <div id="feesModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div class="modal-header" id="modalHeader"></div>
            <div class="fees-table-container">
                <table class="fees-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Year</th>
                            <th>Class Fees</th>
                            <th>Paid (₹)</th>
                            <th>Due (₹)</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="feesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div id="editStudentModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeEditModal">&times;</span>
            <h2><i class="fas fa-edit"></i> Edit Student</h2>
            <form id="editStudentForm" class="edit-form">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" id="editStudentId" readonly>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="text" id="editPassword" required>
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="editFirstName" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" id="editMiddleName">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="editLastName" required>
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="editMobile" maxlength="10" required>
                </div>
                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="text" id="editAadhar" maxlength="12" required>
                </div>
                <div class="form-group full-width">
                    <label>Photo</label>
                    <div class="file-upload">
                        <input type="file" id="editPhotoFile" accept="image/*">
                    </div>
                    <input type="hidden" id="editPhoto">
                    <div class="preview-container" id="editPhotoPreview"></div>
                </div>
                <div class="form-group full-width">
                    <label>Aadhar Document</label>
                    <div class="file-upload">
                        <input type="file" id="editAadharFile" accept="image/*,.pdf">
                    </div>
                    <input type="hidden" id="editAadharDoc">
                    <div class="preview-container" id="editAadharPreview"></div>
                </div>
                <div class="form-group">
                    <label>Registration Date</label>
                    <input type="date" id="editRegDate" required>
                </div>
                <div class="form-group">

    <!-- Confirmation Dialog -->
    <div class="confirm-dialog" id="confirmDialog">

    <script>
        // Global variables
        let token = localStorage.getItem('token');
        let selectedStudent = null;
        let chart = null;
        let allStudents = [];
        let filteredStudents = [];
        let deleteCallback = null;

        // DOM Elements
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const addStudentBtn = document.getElementById('addStudentBtn');
        const searchBtn = document.getElementById('searchBtn');
        const resetBtn = document.getElementById('resetBtn');
        const feesTrackerBtn = document.getElementById('feesTrackerBtn');
        const closeModal = document.getElementById('closeModal');
        const closeEditModal = document.getElementById('closeEditModal');
        const closeAddModal = document.getElementById('closeAddModal');
        const closeDocumentModal = document.getElementById('closeDocumentModal');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        const saveChangesBtn = document.getElementById('saveChangesBtn');
        const addStudentSubmitBtn = document.getElementById('addStudentSubmitBtn');
        const downloadDocumentBtn = document.getElementById('downloadDocumentBtn');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');
        const boardSelect = document.getElementById('boardSelect');
        const classSelect = document.getElementById('classSelect');
        const searchInput = document.getElementById('searchInput');

        // File upload elements
        const addPhotoFile = document.getElementById('addPhotoFile');
        const addAadharFile = document.getElementById('addAadharFile');
        const editPhotoFile = document.getElementById('editPhotoFile');
        const editAadharFile = document.getElementById('editAadharFile');

        // Event Listeners
        loginBtn.addEventListener('click', login);
        logoutBtn.addEventListener('click', logout);
        addStudentBtn.addEventListener('click', openAddStudentModal);
        searchBtn.addEventListener('click', searchStudents);
        resetBtn.addEventListener('click', resetFilters);
        feesTrackerBtn.addEventListener('click', openFeesModal);
        closeModal.addEventListener('click', closeFeesModal);
        closeEditModal.addEventListener('click', closeEditStudentModal);
        closeAddModal.addEventListener('click', closeAddStudentModal);
        closeDocumentModal.addEventListener('click', closeDocumentViewer);
        cancelEditBtn.addEventListener('click', closeEditStudentModal);
        cancelAddBtn.addEventListener('click', closeAddStudentModal);
        saveChangesBtn.addEventListener('click', saveStudentChanges);
        addStudentSubmitBtn.addEventListener('click', addNewStudent);
        downloadDocumentBtn.addEventListener('click', downloadDocument);
        confirmNo.addEventListener('click', hideConfirmDialog);
        boardSelect.addEventListener('change', loadClasses);
        classSelect.addEventListener('change', searchStudents);
        searchInput.addEventListener('keyup', (e) => e.key === 'Enter' && searchStudents());

        // File upload handlers
        addPhotoFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'addPhoto', 'addPhotoPreview'));
        addAadharFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'addAadharDoc', 'addAadharPreview'));
        editPhotoFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'editPhoto', 'editPhotoPreview'));
        editAadharFile.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'editAadharDoc', 'editAadharPreview'));

        // Handle file upload
        function handleFileUpload(file, inputId, previewId) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById(inputId).value = e.target.result;
                showPreview(e.target.result, previewId, file.type);
            };
            reader.readAsDataURL(file);
        }

        // Show preview
        function showPreview(data, previewId, fileType) {
            const preview = document.getElementById(previewId);
            if (fileType.startsWith('image/')) {
                preview.innerHTML = `<img src="${data}" alt="Preview">`;
            } else if (fileType === 'application/pdf') {
                preview.innerHTML = `<iframe src="${data}"></iframe>`;
            }
        }

        // Close modals on outside click
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('feesModal')) closeFeesModal();
            if (e.target === document.getElementById('editStudentModal')) closeEditStudentModal();
            if (e.target === document.getElementById('addStudentModal')) closeAddStudentModal();
            if (e.target === document.getElementById('documentViewerModal')) closeDocumentViewer();
        });

        // Check token
        if (token) verifyToken();

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-exclamation-triangle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Confirm dialog
        function showConfirmDialog(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmDialog').style.display = 'flex';
            deleteCallback = callback;
        }

        function hideConfirmDialog() {
            document.getElementById('confirmDialog').style.display = 'none';
            deleteCallback = null;
        }

        confirmYes.addEventListener('click', () => {
            if (deleteCallback) deleteCallback();
            hideConfirmDialog();
        });

        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) return showToast('Please enter username and password', 'warning');

            try {
                const res = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userid: username, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    loadAllStudents();
                    loadBoards();
                    showToast('Login successful!');
                } else {
                    showToast('Wrong username or password!', 'error');
                    localStorage.removeItem('token');
                }
            } catch (error) {
                showToast('Login failed', 'error');
            }
        }

        // Verify token
        async function verifyToken() {
            try {
                const res = await fetch('/api/verify-token', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    loadAllStudents();
                    loadBoards();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                }
            } catch (error) {
                localStorage.removeItem('token');
                token = null;
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            token = null;
            loginSection.style.display = 'block';
            dashboardSection.style.display = 'none';
            showToast('Logged out successfully');
        }

        // Load all students
        async function loadAllStudents() {
            try {
                const res = await fetch('/api/students', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    allStudents = data.data;
                    filteredStudents = allStudents;
                    displayStudents(filteredStudents);
                    updateStats();
                }
            } catch (error) {
                if (error.status === 401) logout();
            }
        }

        // Load boards
        async function loadBoards() {
            try {
                const res = await fetch('/api/boards', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    boardSelect.innerHTML = '<option value="all">All Boards</option>';
                    data.data.forEach(board => {
                        boardSelect.innerHTML += `<option value="${board}">${board}</option>`;
                    });
                }
            } catch (error) {
                console.error('Load boards error:', error);
            }
        }

        // Load classes
        async function loadClasses() {
            const board = boardSelect.value;
            if (board === 'all') {
                classSelect.innerHTML = '<option value="all">All Classes</option>';
                return;
            }
            try {
                const res = await fetch(`/api/classes/${encodeURIComponent(board)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    classSelect.innerHTML = '<option value="all">All Classes</option>';
                    data.data.forEach(cls => {
                        classSelect.innerHTML += `<option value="${cls}">${cls}</option>`;
                    });
                }
            } catch (error) {
                console.error('Load classes error:', error);
            }
        }

        // Search students
        async function searchStudents() {
            const board = boardSelect.value;
            const className = classSelect.value;
            const searchTerm = searchInput.value.toLowerCase();

            try {
                let url = '/api/students';
                if (board !== 'all' && className !== 'all') {
                    url = `/api/students/${encodeURIComponent(board)}/${encodeURIComponent(className)}`;
                }
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    let students = data.data;
                    if (searchTerm) {
                        students = students.filter(s => {
                            const name = `${s.studentName.first} ${s.studentName.middle} ${s.studentName.last}`.toLowerCase();
                            return name.includes(searchTerm) || s.studentId.toLowerCase().includes(searchTerm);
                        });
                    }
                    filteredStudents = students;
                    displayStudents(filteredStudents);
                    updateStats();
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        // Reset filters
        function resetFilters() {
            boardSelect.value = 'all';
            classSelect.innerHTML = '<option value="all">All Classes</option>';
            searchInput.value = '';
            loadAllStudents();
            showToast('Filters reset');
        }

        // Display students
        function displayStudents(students) {
            const grid = document.getElementById('studentsGrid');
            if (students.length === 0) {
                grid.innerHTML = '<div class="no-data"><i class="fas fa-users-slash"></i><p>No students found</p></div>';
                return;
            }

            grid.innerHTML = '';
            students.forEach(student => {
                const fullName = `${student.studentName.first} ${student.studentName.middle} ${student.studentName.last}`.replace(/\s+/g, ' ').trim();
                let status = 'unpaid';
                if (student.feesHistory?.length) {
                    const latest = student.feesHistory[student.feesHistory.length - 1];
                    status = latest.status;
                }
                const statusClass = status === 'paid' ? 'status-paid' : status === 'partial' ? 'status-partial' : 'status-unpaid';

                const card = document.createElement('div');
                card.className = `student-card ${selectedStudent?.studentId === student.studentId ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="status-indicator ${statusClass}" title="Status: ${status}"></div>
                    <img src="${student.photo}" alt="${fullName}" onerror="this.src='https://via.placeholder.com/100'">
                    <h4>${fullName}</h4>
                    <div class="student-id"><i class="fas fa-id-card"></i> ${student.studentId}</div>
                    <div class="student-class"><i class="fas fa-graduation-cap"></i> ${student.education.board} - ${student.education.class}</div>
                    <span class="fees-badge"><i class="fas fa-rupee-sign"></i> ₹${student.classMonthlyFees}/month</span>
                    <div class="student-card-actions">
                        <button class="edit-card-btn" data-id="${student.studentId}"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-card-btn" data-id="${student.studentId}"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                `;

                card.addEventListener('click', (e) => !e.target.closest('button') && selectStudent(student.studentId));
                card.querySelector('.edit-card-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditStudentModal(student.studentId);
                });
                card.querySelector('.delete-card-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    showConfirmDialog(`Delete student ${fullName}?`, () => deleteStudent(student.studentId));
                });

                grid.appendChild(card);
            });
        }

        // Update stats
        function updateStats() {
            let total = filteredStudents.length;
            let collected = 0, pending = 0, paid = 0;
            filteredStudents.forEach(s => {
                if (s.feesHistory?.length) {
                    const totalPaid = s.feesHistory.reduce((sum, f) => sum + f.paidAmount, 0);
                    const totalDue = s.feesHistory.reduce((sum, f) => sum + f.dueAmount, 0);
                    collected += totalPaid;
                    pending += totalDue;
                    if (s.feesHistory.every(f => f.status === 'paid')) paid++;
                }
            });
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('totalFees').textContent = `₹${collected}`;
            document.getElementById('pendingFees').textContent = `₹${pending}`;
            document.getElementById('fullyPaid').textContent = paid;
        }

        // Select student
        async function selectStudent(id) {
            try {
                const res = await fetch(`/api/student-dashboard/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    selectedStudent = data.data;
                    displayStudentDetails(selectedStudent);
                    displayStudents(filteredStudents);
                    document.getElementById('studentDetails').style.display = 'block';
                    updateChart(selectedStudent);
                    document.getElementById('studentDetails').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                if (error.status === 401) logout();
            }
        }

        // Display student details
        function displayStudentDetails(s) {
            const fullName = `${s.studentName.first} ${s.studentName.middle} ${s.studentName.last}`.replace(/\s+/g, ' ').trim();
            const father = `${s.fatherName.first} ${s.fatherName.middle} ${s.fatherName.last}`.trim();
            const mother = `${s.motherName.first} ${s.motherName.middle} ${s.motherName.last}`.trim();
            const reg = new Date(s.registrationDate).toLocaleDateString();
            const join = new Date(s.joiningDate).toLocaleDateString();

            const isPDF = s.aadharDocument?.includes('application/pdf') || s.aadharDocument?.startsWith('data:application/pdf');
            const preview = isPDF ? `<iframe src="${s.aadharDocument}"></iframe>` : `<img src="${s.aadharDocument}" onclick="viewDocument('${s.aadharDocument}', 'Aadhar - ${fullName}')">`;

            document.getElementById('studentInfo').innerHTML = `
                <div class="details-header">
                    <img src="${s.photo}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="basic-info">
                        <h2>${fullName}</h2>
                        <p><i class="fas fa-id-card"></i> ID: ${s.studentId}</p>
                        <p><i class="fas fa-id-card"></i> Aadhar: ${s.aadharNumber}</p>
                        <p><i class="fas fa-calendar"></i> Registration: ${reg}</p>
                        <p><i class="fas fa-calendar-check"></i> Joining: ${join}</p>
                    </div>
                    <div class="details-actions">
                        <button class="edit-details-btn" id="editDetailsBtn"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-details-btn" id="deleteDetailsBtn"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-card"><h3><i class="fas fa-user-graduate"></i> Student</h3><p><i class="fas fa-phone"></i> ${s.mobile}</p><p><i class="fas fa-graduation-cap"></i> ${s.education.board} - ${s.education.class}</p><p><i class="fas fa-rupee-sign"></i> ₹${s.classMonthlyFees}</p></div>
                    <div class="info-card"><h3><i class="fas fa-user-tie"></i> Father</h3><p><i class="fas fa-user"></i> ${father}</p><p><i class="fas fa-phone"></i> ${s.fatherMobile}</p></div>
                    <div class="info-card"><h3><i class="fas fa-user"></i> Mother</h3><p><i class="fas fa-user"></i> ${mother || 'Not Provided'}</p></div>
                    <div class="info-card"><h3><i class="fas fa-map-marker-alt"></i> Address</h3><p><i class="fas fa-home"></i> ${s.address.current}</p><p><i class="fas fa-home"></i> ${s.address.permanent}</p></div>
                </div>
                <div class="document-preview">
                    <h4><i class="fas fa-id-card"></i> Aadhar Document</h4>
                    ${preview}
                    <div class="document-actions">
                        <button class="view-document" onclick="viewDocument('${s.aadharDocument}', 'Aadhar - ${fullName}')"><i class="fas fa-eye"></i> View</button>
                        <button class="download-document" onclick="downloadDoc('${s.aadharDocument}', '${s.studentId}_Aadhar')"><i class="fas fa-download"></i> Download</button>
                    </div>
                </div>
            `;
            document.getElementById('editDetailsBtn').addEventListener('click', () => openEditStudentModal(s.studentId));
            document.getElementById('deleteDetailsBtn').addEventListener('click', () => showConfirmDialog(`Delete ${fullName}?`, () => deleteStudent(s.studentId)));
        }

        // View document
        function viewDocument(url, title) {
            document.getElementById('documentTitle').textContent = title;
            const isPDF = url.includes('application/pdf') || url.startsWith('data:application/pdf');
            document.getElementById('documentContent').innerHTML = isPDF ? `<iframe src="${url}" style="width:100%; height:70vh;"></iframe>` : `<img src="${url}" style="max-width:100%; max-height:70vh;">`;
            window.currentDoc = url;
            document.getElementById('documentViewerModal').style.display = 'block';
        }

        function closeDocumentViewer() {
            document.getElementById('documentViewerModal').style.display = 'none';
        }

        function downloadDocument() {
            if (window.currentDoc) downloadDoc(window.currentDoc, 'document');
        }

        function downloadDoc(url, name) {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
        }

        // Update chart
        function updateChart(student) {
            if (!student.feesHistory?.length) {
                document.getElementById('feesChart').style.display = 'none';
                return;
            }
            document.getElementById('feesChart').style.display = 'block';
            const months = student.feesHistory.map(f => f.month);
            const paid = student.feesHistory.map(f => f.paidAmount);
            const due = student.feesHistory.map(f => f.dueAmount);
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('feesChart'), {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [
                        { label: 'Paid (₹)', data: paid, backgroundColor: '#28a745' },
                        { label: 'Due (₹)', data: due, backgroundColor: '#dc3545' }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // Open fees modal
        function openFeesModal() {
            if (!selectedStudent) return showToast('Select a student first', 'warning');
            const modal = document.getElementById('feesModal');
            const fullName = `${selectedStudent.studentName.first} ${selectedStudent.studentName.middle} ${selectedStudent.studentName.last}`.trim();
            document.getElementById('modalHeader').innerHTML = `
                <img src="${selectedStudent.photo}">
                <div class="modal-header-info">
                    <h3>${fullName}</h3>
                    <p><i class="fas fa-id-card"></i> ID: ${selectedStudent.studentId}</p>
                    <p><i class="fas fa-phone"></i> ${selectedStudent.mobile}</p>
                    <p><i class="fas fa-graduation-cap"></i> ${selectedStudent.education.board} - ${selectedStudent.education.class}</p>
                    <p><i class="fas fa-rupee-sign"></i> ₹${selectedStudent.classMonthlyFees}/month</p>
                </div>
            `;
            const tbody = document.getElementById('feesTableBody');
            tbody.innerHTML = '';
            
            // ✅ FIX: Generate all months from joining date to current date
            const joining = new Date(selectedStudent.joiningDate);
            const now = new Date();
            let current = new Date(joining);
            
            // Sort fees history if exists
            const history = selectedStudent.feesHistory || [];
            const historyMap = {};
            history.forEach(f => historyMap[f.month] = f);

            while (current <= now) {
                const monthName = current.toLocaleString('default', { month: 'long' });
                const year = current.getFullYear();
                const monthKey = `${monthName} ${year}`;
                const fee = historyMap[monthKey] || { paidAmount: 0, dueAmount: selectedStudent.classMonthlyFees, status: 'unpaid' };
                
                const statusClass = fee.status === 'paid' ? 'status-paid' : fee.status === 'partial' ? 'status-partial' : 'status-unpaid';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="month-name">${monthName}</td>
                    <td>${year}</td>
                    <td>₹${selectedStudent.classMonthlyFees}</td>
                    <td><input type="number" class="fees-input" id="paid-${monthKey}" value="${fee.paidAmount}" min="0" max="${selectedStudent.classMonthlyFees}"></td>
                    <td class="due-amount" id="due-${monthKey}">₹${fee.dueAmount}</td>
                    <td><span class="status-badge ${statusClass}">${fee.status}</span></td>
                    <td><button class="save-fees" data-month="${monthKey}"><i class="fas fa-save"></i> Save</button></td>
                `;
                tbody.appendChild(row);
                current.setMonth(current.getMonth() + 1);
            }

            // Add event listeners to save buttons
            tbody.querySelectorAll('.save-fees').forEach(btn => {
                btn.addEventListener('click', () => {
                    const month = btn.dataset.month;
                    const paid = parseFloat(document.getElementById(`paid-${month}`).value) || 0;
                    saveFees(month, paid);
                });
            });

            modal.style.display = 'block';
        }

        // Save fees
        async function saveFees(month, paid) {
            if (paid > selectedStudent.classMonthlyFees) {
                return showToast(`Max ₹${selectedStudent.classMonthlyFees}`, 'warning');
            }
            try {
                const res = await fetch(`/api/update-fees/${selectedStudent.studentId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ month, paidAmount: paid })
                });
                const data = await res.json();
                if (data.success) {
                    selectedStudent.feesHistory = data.data.feesHistory;
                    document.getElementById(`due-${month}`).innerHTML = `₹${selectedStudent.classMonthlyFees - paid}`;
                    updateChart(selectedStudent);
                    updateStats();
                    showToast('Fees updated!');
                }
            } catch (error) {
                showToast('Update failed', 'error');
            }
        }

        function closeFeesModal() {
            document.getElementById('feesModal').style.display = 'none';
        }

        // Edit student
        async function openEditStudentModal(id) {
            try {
                const res = await fetch(`/api/student-dashboard/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const s = data.data;
                    document.getElementById('editStudentId').value = s.studentId;
                    document.getElementById('editPassword').value = s.password;
                    document.getElementById('editFirstName').value = s.studentName.first;
                    document.getElementById('editMiddleName').value = s.studentName.middle || '';
                    document.getElementById('editLastName').value = s.studentName.last;
                    document.getElementById('editMobile').value = s.mobile;
                    document.getElementById('editAadhar').value = s.aadharNumber;
                    document.getElementById('editPhoto').value = s.photo;
                    document.getElementById('editAadharDoc').value = s.aadharDocument;
                    if (s.photo) showPreview(s.photo, 'editPhotoPreview', 'image/jpeg');
                    if (s.aadharDocument) {
                        const type = s.aadharDocument.includes('pdf') ? 'application/pdf' : 'image/jpeg';
                        showPreview(s.aadharDocument, 'editAadharPreview', type);
                    }
                    document.getElementById('editRegDate').value = new Date(s.registrationDate).toISOString().split('T')[0];
                    document.getElementById('editJoinDate').value = new Date(s.joiningDate).toISOString().split('T')[0];
                    document.getElementById('editFees').value = s.classMonthlyFees;
                    document.getElementById('editFatherFirstName').value = s.fatherName.first;
                    document.getElementById('editFatherMiddleName').value = s.fatherName.middle || '';
                    document.getElementById('editFatherLastName').value = s.fatherName.last;
                    document.getElementById('editFatherMobile').value = s.fatherMobile;
                    document.getElementById('editMotherFirstName').value = s.motherName.first || '';
                    document.getElementById('editMotherMiddleName').value = s.motherName.middle || '';
                    document.getElementById('editMotherLastName').value = s.motherName.last || '';
                    document.getElementById('editCurrentAddress').value = s.address.current;
                    document.getElementById('editPermanentAddress').value = s.address.permanent;
                    document.getElementById('editBoard').value = s.education.board;
                    document.getElementById('editClass').value = s.education.class;
                    document.getElementById('editStudentModal').style.display = 'block';
                }
            } catch (error) {
                showToast('Failed to load student', 'error');
            }
        }

        function closeEditStudentModal() {
            document.getElementById('editStudentModal').style.display = 'none';
        }

        async function saveStudentChanges() {
            const id = document.getElementById('editStudentId').value;
            const data = {
                studentId: id,
                password: document.getElementById('editPassword').value,
                classMonthlyFees: parseInt(document.getElementById('editFees').value),
                photo: document.getElementById('editPhoto').value,
                student: {
                    firstName: document.getElementById('editFirstName').value,
                    middleName: document.getElementById('editMiddleName').value,
                    lastName: document.getElementById('editLastName').value,
                    mobile: document.getElementById('editMobile').value
                },
                aadhar: document.getElementById('editAadhar').value,
                aadharDocument: document.getElementById('editAadharDoc').value,
                dates: {
                    reg: document.getElementById('editRegDate').value,
                    join: document.getElementById('editJoinDate').value
                },
                father: {
                    firstName: document.getElementById('editFatherFirstName').value,
                    middleName: document.getElementById('editFatherMiddleName').value,
                    lastName: document.getElementById('editFatherLastName').value,
                    mobile: document.getElementById('editFatherMobile').value
                },
                mother: {
                    firstName: document.getElementById('editMotherFirstName').value,
                    middleName: document.getElementById('editMotherMiddleName').value,
                    lastName: document.getElementById('editMotherLastName').value
                },
                address: {
                    current: document.getElementById('editCurrentAddress').value,
                    permanent: document.getElementById('editPermanentAddress').value
                },
                education: {
                    board: document.getElementById('editBoard').value,
                    class: document.getElementById('editClass').value
                }
            };
            try {
                const res = await fetch(`/api/students/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if (resData.success) {
                    showToast('Student updated!');
                    closeEditStudentModal();
                    loadAllStudents();
                    if (selectedStudent?.studentId === id) selectStudent(id);
                }
            } catch (error) {
                showToast('Update failed', 'error');
            }
        }

        // Add student
        function openAddStudentModal() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('addRegDate').value = today;
            document.getElementById('addJoinDate').value = today;
            document.getElementById('addStudentModal').style.display = 'block';
        }

        function closeAddStudentModal() {
            document.getElementById('addStudentModal').style.display = 'none';
            document.getElementById('addStudentForm').reset();
        }

        async function addNewStudent() {
            const required = ['addStudentId', 'addPassword', 'addFirstName', 'addLastName', 'addMobile', 'addAadhar', 'addPhoto', 'addAadharDoc', 'addRegDate', 'addJoinDate', 'addFees', 'addFatherFirstName', 'addFatherLastName', 'addFatherMobile', 'addCurrentAddress', 'addPermanentAddress', 'addBoard', 'addClass'];
            for (const f of required) {
                if (!document.getElementById(f).value) return showToast('Fill all required fields', 'warning');
            }
            const data = {
                studentId: document.getElementById('addStudentId').value,
                password: document.getElementById('addPassword').value,
                classMonthlyFees: parseInt(document.getElementById('addFees').value),
                photo: document.getElementById('addPhoto').value,
                student: {
                    firstName: document.getElementById('addFirstName').value,
                    middleName: document.getElementById('addMiddleName').value,
                    lastName: document.getElementById('addLastName').value,
                    mobile: document.getElementById('addMobile').value
                },
                aadhar: document.getElementById('addAadhar').value,
                aadharDocument: document.getElementById('addAadharDoc').value,
                dates: {
                    reg: document.getElementById('addRegDate').value,
                    join: document.getElementById('addJoinDate').value
                },
                father: {
                    firstName: document.getElementById('addFatherFirstName').value,
                    middleName: document.getElementById('addFatherMiddleName').value,
                    lastName: document.getElementById('addFatherLastName').value,
                    mobile: document.getElementById('addFatherMobile').value
                },
                mother: {
                    firstName: document.getElementById('addMotherFirstName').value,
                    middleName: document.getElementById('addMotherMiddleName').value,
                    lastName: document.getElementById('addMotherLastName').value
                },
                address: {
                    current: document.getElementById('addCurrentAddress').value,
                    permanent: document.getElementById('addPermanentAddress').value
                },
                education: {
                    board: document.getElementById('addBoard').value,
                    class: document.getElementById('addClass').value
                }
            };
            try {
                const res = await fetch('/api/student-register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if (resData.success) {
                    showToast('Student added!');
                    closeAddStudentModal();
                    loadAllStudents();
                } else {
                    showToast(resData.message || 'Failed', 'error');
                }
            } catch (error) {
                showToast('Add failed', 'error');
            }
        }

        // Delete student
        async function deleteStudent(id) {
            try {
                const res = await fetch(`/api/students/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Student deleted!');
                    if (selectedStudent?.studentId === id) {
                        selectedStudent = null;
                        document.getElementById('studentDetails').style.display = 'none';
                    }
                    loadAllStudents();
                }
            } catch (error) {
                showToast('Delete failed', 'error');
            }
        }
    </script>
